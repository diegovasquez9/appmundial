    // ----------------------------------------------------
    // MAIN APP COMPONENT
    // ----------------------------------------------------
    function App() {
      // Auth States
      const [session, setSession] = useState(null);
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Data States
      const [matches, _setMatches] = useState([]);
      
      const sanitizeMatchesList = (matchesList) => {
        return (matchesList || []).map(m => {
          if (m.home_score !== null && m.away_score !== null && m.status === "Scheduled") {
            supabase.from('matches').update({ status: 'Finished' }).eq('id', m.id).then(() => {});
            return { ...m, status: "Finished" };
          }
          return m;
        });
      };

      const setMatches = (list) => {
        _setMatches(sanitizeMatchesList(list));
      };
      const [predictions, setPredictions] = useState({});
      const [groups, setGroups] = useState([]);
      const [systemTime, setSystemTime] = useState(new Date().toISOString().substring(0, 16));
      const [isTimeSimulated, setIsTimeSimulated] = useState(false);
      
      const [activeTab, setActiveTab] = useState("dashboard");
      const [selectedGroup, setSelectedGroup] = useState("");
      const [showAdmin, setShowAdmin] = useState(false);
      
      // Save notification state
      const [saveStatus, setSaveStatus] = useState({ visible: false, message: "" });

      // Trigger temporary visual auto-save toast
      const triggerSaveToast = (msg) => {
        setSaveStatus({ visible: true, message: msg });
        setTimeout(() => {
          setSaveStatus({ visible: false, message: "" });
        }, 2000);
      };

      // 1. SUPABASE AUTH LISTENER
      useEffect(() => {
        // Get initial session
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) {
            setUser(session.user);
            fetchUserData(session.user.id);
          } else {
            setAuthLoading(false);
          }
        });

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (_event, session) => {
          setSession(session);
          if (session) {
            setUser(session.user);
            fetchUserData(session.user.id);
          } else {
            setUser(null);
            setProfile(null);
            setPredictions({});
            setGroups([]);
            setAuthLoading(false);
          }
        });

        // Setup real time clock tick if not simulated
        const timer = setInterval(() => {
          if (!isTimeSimulated) {
            setSystemTime(new Date().toISOString().substring(0, 16));
          }
        }, 30000); // every 30s

        return () => {
          subscription.unsubscribe();
          clearInterval(timer);
        };
      }, [isTimeSimulated]);

      // Fetch all database records related to the user
      const fetchUserData = async (userId) => {
        try {
          setAuthLoading(true);

          // a. Profile
          const { data: profileData, error: profileErr } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', userId)
            .maybeSingle();

          if (profileErr) throw profileErr;
          setProfile(profileData);

          // b. Matches
          const { data: matchesData, error: matchesErr } = await supabase
            .from('matches')
            .select('*')
            .order('date');

          if (matchesErr) throw matchesErr;
          setMatches(matchesData || []);

          // c. Predictions (only current user's predictions are returned under user_id)
          const { data: predsData, error: predsErr } = await supabase
            .from('predictions')
            .select('*')
            .eq('user_id', userId);

          if (predsErr) throw predsErr;
          
          const predObj = {};
          predsData?.forEach(p => {
            predObj[`${userId}_${p.match_id}`] = {
              homeScore: p.home_score,
              awayScore: p.away_score
            };
          });
          setPredictions(predObj);

          // d. User Groups
          const { data: memberships, error: memberErr } = await supabase
            .from('group_members')
            .select('group_id')
            .eq('user_id', userId);

          if (memberErr) throw memberErr;

          if (memberships && memberships.length > 0) {
            const groupIds = memberships.map(m => m.group_id);
            const { data: groupsData, error: groupsErr } = await supabase
              .from('groups')
              .select('*')
              .in('id', groupIds);
            
            if (groupsErr) throw groupsErr;
            setGroups(groupsData || []);
            
            if (groupsData && groupsData.length > 0) {
              setSelectedGroup(groupsData[0].id);
            }
          } else {
            setGroups([]);
          }

        } catch (err) {
          console.error("Error loading user data from Supabase:", err);
          triggerSaveToast("Error al cargar datos de Supabase: " + err.message);
        } finally {
          setAuthLoading(false);
        }
      };

      // ----------------------------------------------------
      // AUTH ACTIONS
      // ----------------------------------------------------
      const handleLogout = async () => {
        setAuthLoading(true);
        const { error } = await supabase.auth.signOut();
        if (error) {
          triggerSaveToast(`Error de cierre: ${error.message}`);
          setAuthLoading(false);
        } else {
          triggerSaveToast("Sesión cerrada");
        }
      };

      // ----------------------------------------------------
      // GROUP MANAGEMENT
      // ----------------------------------------------------
      const handleCreateGroup = async (groupName) => {
        if (!groupName.trim()) return;
        try {
          const code = "GRP-" + Math.random().toString(36).substring(2, 6).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
          
          // 1. Create group
          const { data: groupData, error: groupErr } = await supabase
            .from('groups')
            .insert({
              name: groupName,
              code: code,
              created_by: user.id
            })
            .select()
            .single();

          if (groupErr) throw groupErr;

          // 2. Add creator as member
          const { error: memberErr } = await supabase
            .from('group_members')
            .insert({
              group_id: groupData.id,
              user_id: user.id
            });

          if (memberErr) throw memberErr;

          // 3. Reload Groups
          const updatedGroups = [...groups, groupData];
          setGroups(updatedGroups);
          setSelectedGroup(groupData.id);
          triggerSaveToast(`Grupo "${groupName}" creado con éxito`);

        } catch (err) {
          console.error("Error creating group:", err);
          triggerSaveToast(`Error: ${err.message}`);
        }
      };

      const handleJoinGroup = async (code) => {
        if (!code.trim()) return { success: false, message: "Código inválido" };
        try {
          const normalizedCode = code.trim().toUpperCase();
          
          // 1. Fetch group by code
          const { data: group, error: fetchErr } = await supabase
            .from('groups')
            .select('*')
            .eq('code', normalizedCode)
            .maybeSingle();

          if (fetchErr) throw fetchErr;
          if (!group) return { success: false, message: "Código de grupo no encontrado" };

          // 2. Check if already member
          if (groups.some(g => g.id === group.id)) {
            return { success: false, message: "Ya eres miembro de este grupo" };
          }

          // 3. Insert membership
          const { error: joinErr } = await supabase
            .from('group_members')
            .insert({
              group_id: group.id,
              user_id: user.id
            });

          if (joinErr) throw joinErr;

          // 4. Reload Groups
          const updatedGroups = [...groups, group];
          setGroups(updatedGroups);
          setSelectedGroup(group.id);
          triggerSaveToast(`Te has unido al grupo ${group.name}`);
          return { success: true };

        } catch (err) {
          console.error("Error joining group:", err);
          return { success: false, message: `Error: ${err.message}` };
        }
      };

      // ----------------------------------------------------
      // PREDICTIONS AUTO-SAVE ON BLUR
      // ----------------------------------------------------
      const handleSavePrediction = async (matchId, homeScore, awayScore) => {
        if (homeScore === "" || awayScore === "") return; // Don't save incomplete predictions

        const predKey = `${user.id}_${matchId}`;
        const match = matches.find(m => m.id === matchId);
        if (!match) return;

        // Perform local locking check
        const kickoff = new Date(match.date);
        const sysTime = new Date(systemTime);
        const diffMins = (kickoff.getTime() - sysTime.getTime()) / (1000 * 60);
        if (diffMins <= 10) {
          triggerSaveToast("Error: Las predicciones están cerradas (límite 10 min)");
          return;
        }

        // Optimistic UI state update
        setPredictions(prev => ({
          ...prev,
          [predKey]: { homeScore, awayScore }
        }));

        try {
          // Upsert in Supabase (will fail under RLS if DB time is within 10 min of kickoff)
          const { error } = await supabase
            .from('predictions')
            .upsert({
              user_id: user.id,
              match_id: matchId,
              home_score: parseInt(homeScore),
              away_score: parseInt(awayScore),
              updated_at: new Date().toISOString()
            }, { onConflict: 'user_id,match_id' });

          if (error) throw error;
          triggerSaveToast("Pronóstico guardado");
        } catch (err) {
          console.error("Supabase upsert error:", err);
          triggerSaveToast(`Error de base de datos: ${err.message}`);
          
          // Revert optimistic update by fetching original predictions again
          const { data: originalPred } = await supabase
            .from('predictions')
            .select('*')
            .eq('user_id', user.id)
            .eq('match_id', matchId)
            .maybeSingle();

          if (originalPred) {
            setPredictions(prev => ({
              ...prev,
              [predKey]: { homeScore: originalPred.home_score, awayScore: originalPred.away_score }
            }));
          } else {
            setPredictions(prev => {
              const clone = { ...prev };
              delete clone[predKey];
              return clone;
            });
          }
        }
      };

      // ----------------------------------------------------
      // ADMIN METHODS (SYNCING & TIME TRAVEL)
      // ----------------------------------------------------
      const handleAdminUpdateMatch = async (matchId, data) => {
        try {
          const { error } = await supabase
            .from('matches')
            .update({
              home_score: data.homeScore === "" || data.homeScore === null ? null : parseInt(data.homeScore),
              away_score: data.awayScore === "" || data.awayScore === null ? null : parseInt(data.awayScore),
              status: data.status
            })
            .eq('id', matchId);

          if (error) throw error;

          // Reload matches
          const updatedMatches = matches.map(m => {
            if (m.id === matchId) {
              return {
                ...m,
                home_score: data.homeScore === "" || data.homeScore === null ? null : parseInt(data.homeScore),
                away_score: data.awayScore === "" || data.awayScore === null ? null : parseInt(data.awayScore),
                status: data.status
              };
            }
            return m;
          });
          setMatches(updatedMatches);
          triggerSaveToast("Resultado actualizado en Supabase");
        } catch (err) {
          triggerSaveToast(`Error al actualizar resultado: ${err.message}`);
        }
      };

      // ----------------------------------------------------
      // SCORING & DYNAMIC STANDINGS
      // ----------------------------------------------------
      // 10-Minute Lock Rule Helper
      const getMatchLockState = (match, sysTimeStr) => {
        if (match.status === "Finished" || match.status === "Live") {
          return { locked: true, reason: match.status === "Finished" ? "Finalizado" : "En Vivo" };
        }
        const sysTime = new Date(sysTimeStr);
        const kickoff = new Date(match.date);
        
        const diffMs = kickoff.getTime() - sysTime.getTime();
        const diffMins = Math.floor(diffMs / (1000 * 60));
        
        if (diffMins <= 10) {
          return { locked: true, reason: diffMins < 0 ? "Iniciado" : "Cerrado" };
        }
        return { locked: false, diffMins };
      };

      // Scoring Algorithm
      const calculatePredictionScore = (pred, match) => {
        if (match.status !== "Finished") return null;
        if (!pred || pred.homeScore === null || pred.homeScore === "" || pred.awayScore === null || pred.awayScore === "") return 0;

        const pHome = parseInt(pred.homeScore);
        const pAway = parseInt(pred.awayScore);
        const mHome = parseInt(match.home_score);
        const mAway = parseInt(match.away_score);

        // Rule 1: Exact Match (5 Points)
        if (pHome === mHome && pAway === mAway) {
          return 5;
        }

        // Rule 2: Outcome Match Only (3 Points)
        const pDiff = pHome - pAway;
        const mDiff = mHome - mAway;

        if ((pDiff > 0 && mDiff > 0) || (pDiff < 0 && mDiff < 0) || (pDiff === 0 && mDiff === 0)) {
          return 3;
        }

        // Rule 3: No Match (0 Points)
        return 0;
      };

      // Calculate stats for current active user
      const currentUserStats = useMemo(() => {
        if (!user) return { points: 0, exacts: 0, outcomes: 0, missed: 0, predictedCount: 0 };
        let points = 0;
        let exacts = 0;
        let outcomes = 0;
        let missed = 0;
        let predictedCount = 0;

        matches.forEach(m => {
          const pred = predictions[`${user.id}_${m.id}`];
          const hasPrediction = pred && pred.homeScore !== "" && pred.awayScore !== "";

          if (hasPrediction) predictedCount++;
          
          if (m.status === "Finished") {
            const pts = calculatePredictionScore(pred, m);
            if (pts !== null) {
              points += pts;
              if (pts === 5) exacts++;
              else if (pts === 3) outcomes++;
              else missed++;
            }
          }
        });

        return { points, exacts, outcomes, missed, predictedCount };
      }, [user, matches, predictions]);

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {todayMatches.map(match => (

                    key={match.id}
                    match={match}
                    prediction={predictions[`${currentUser.id}_${match.id}`]}

                    getMatchLockState={getMatchLockState}
                    calculatePredictionScore={calculatePredictionScore}

                  />

              </div>

          </div>

          {/* SECTION: TOURNAMENT CALENDAR */}
          <div className="space-y-4">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
              <h2 className="text-sm uppercase tracking-wider font-extrabold text-white flex items-center gap-2 display-font">
                <Icon name="calendar" className="w-4 h-4 text-soccer-primary" />
                Calendario del Torneo Real
              </h2>

              <div className="flex bg-slate-950 p-1 rounded-lg border border-soccer-border text-xs w-full sm:w-auto">
                <button

                >
                  Todos
                </button>
                <button
                  onClick={() => setFilterStage("group")}
                  className={`flex-1 sm:flex-none px-3 py-1.5 rounded-md font-medium transition-colors ${filterStage === "group" ? 'bg-slate-800 text-white' : 'text-soccer-textMuted hover:text-white'}`}
                >
                  Fase de Grupos
                </button>
                <button
                  onClick={() => setFilterStage("knockout")}
                  className={`flex-1 sm:flex-none px-3 py-1.5 rounded-md font-medium transition-colors ${filterStage === "knockout" ? 'bg-slate-800 text-white' : 'text-soccer-textMuted hover:text-white'}`}
                >
                  Eliminatorias
                </button>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {filteredMatches.map(match => (
                <MatchCard
                  key={match.id}
                  match={match}
                  prediction={predictions[`${currentUser.id}_${match.id}`]}
                  systemTime={systemTime}
                  getMatchLockState={getMatchLockState}
                  calculatePredictionScore={calculatePredictionScore}
                  onSave={handleSavePrediction}

    }

    // ----------------------------------------------------
    // COMPONENT: MATCH CARD (REAL INTEGRATION)
    // ----------------------------------------------------
    function MatchCard({
      match,
      prediction,
      systemTime,
      getMatchLockState,
      calculatePredictionScore,
      onSave
    }) {
      const lockState = getMatchLockState(match, systemTime);
      const points = calculatePredictionScore(prediction, match);

      const [homeVal, setHomeVal] = useState(prediction?.homeScore !== undefined ? prediction.homeScore : "");
      const [awayVal, setAwayVal] = useState(prediction?.awayScore !== undefined ? prediction.awayScore : "");

      // Sync local state if prediction from DB changes
      useEffect(() => {
        setHomeVal(prediction?.homeScore !== undefined ? prediction.homeScore : "");
        setAwayVal(prediction?.awayScore !== undefined ? prediction.awayScore : "");
      }, [prediction]);

      const handleBlur = () => {
        if (homeVal !== "" && awayVal !== "") {
          onSave(match.id, homeVal, awayVal);
        }
      };

      const kickoffDate = new Date(match.date);
      const formattedDate = kickoffDate.toLocaleString('es-ES', {
        day: '2-digit',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });

      const getCountdownText = () => {
        if (match.status === "Finished") return "Finalizado";
        if (match.status === "Live") return "En Vivo";

        const diffMs = kickoffDate.getTime() - new Date(systemTime).getTime();
        const diffMins = Math.floor(diffMs / (1000 * 60));
        
        if (diffMins < 0) return "Iniciado / En espera";
        if (diffMins <= 10) return "Bloqueado";
        
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 1) return `Cierra en ${diffMins} min`;
        if (diffHours < 24) return `Cierra en ${diffHours}h ${diffMins % 60}m`;
        
        return `Empieza en ${Math.floor(diffHours / 24)}d ${diffHours % 24}h`;
      };

      const homeCode = TEAM_COUNTRY_CODES[match.home_team_name];
      const awayCode = TEAM_COUNTRY_CODES[match.away_team_name];

      return (
        <div className={`glass rounded-2xl p-4 transition-all duration-300 hover:-translate-y-0.5 shadow-md flex flex-col justify-between ${match.status === 'Live' ? 'border-red-500/50 shadow-red-950/20 shadow-lg' : ''} ${points === 5 ? 'glass-gold-glowing' : ''} ${points === 3 ? 'glass-glowing' : ''}`}>
          
          <div className="flex justify-between items-center mb-3">
            <span className="text-[10px] font-bold tracking-wider text-soccer-textMuted uppercase">{match.stage}</span>
            <div className="flex items-center gap-1.5">
              {match.status === "Live" && (
                <span className="flex items-center gap-1 bg-red-950 text-red-400 border border-red-800 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">
                  <span className="h-1.5 w-1.5 rounded-full bg-red-500 live-dot"></span>
                  En Vivo
                </span>
              )}
              {match.status === "Finished" && (
                <span className="bg-slate-800 text-slate-400 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">
                  Finalizado
                </span>
              )}
              {match.status === "Scheduled" && !lockState.locked && (
                <span className="bg-emerald-950 text-emerald-400 border border-emerald-800 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">
                  Abierto
                </span>
              )}
              {match.status === "Scheduled" && lockState.locked && (
                <span className="bg-amber-950 text-amber-500 border border-amber-800 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase flex items-center gap-1">
                  <Icon name="lock" className="w-2.5 h-2.5" />
                  Cerrado
                </span>
              )}
            </div>
          </div>

          <div className="grid grid-cols-7 items-center my-2 gap-1 text-center">
            {/* Home Team */}
            <div className="col-span-2 flex flex-col items-center gap-1">
              {homeCode ? (
                <img src={`https://flagcdn.com/48x36/${homeCode}.png`} alt={match.home_team_name} className="w-10 h-7 object-cover rounded shadow-md select-none mb-1" />
              ) : (
                <span className="text-3xl filter drop-shadow-md select-none">🏳️</span>
              )}
              <span className="text-xs font-bold text-slate-100 max-w-[80px] truncate leading-tight">{match.home_team_name}</span>
            </div>

            {/* Score & Prediction Area */}
            <div className="col-span-3 flex flex-col justify-center items-center gap-3">
              {/* Resultado Real (Arriba) */}
              <div className="flex flex-col items-center">
                <span className="text-[8px] uppercase font-bold text-soccer-accent tracking-wider mb-1">Resultado Real</span>
                <div className="flex items-center gap-1.5 justify-center">
                  <div className="w-9 h-8 rounded-lg bg-slate-950 border border-soccer-border/80 flex items-center justify-center text-xs font-mono font-black text-soccer-accent">
                    {match.home_score !== null && match.home_score !== undefined ? match.home_score : "-"}
                  </div>
                  <span className="text-[10px] text-soccer-textMuted font-bold font-mono px-0.5">vs</span>
                  <div className="w-9 h-8 rounded-lg bg-slate-950 border border-soccer-border/80 flex items-center justify-center text-xs font-mono font-black text-soccer-accent">
                    {match.away_score !== null && match.away_score !== undefined ? match.away_score : "-"}
                  </div>
                </div>
              </div>

              {/* Resultado Predicho (Abajo) */}
              <div className="flex flex-col items-center">
                <span className="text-[8px] uppercase font-bold text-soccer-primary tracking-wider mb-1">Mi Pronóstico</span>
                <div className="flex items-center gap-1.5 justify-center">
                  <input
                    type="number"
                    disabled={lockState.locked}
                    value={homeVal}
                    onChange={(e) => setHomeVal(e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value)))}
                    onBlur={handleBlur}
                    placeholder="-"
                    className={`w-9 h-8 rounded-lg bg-slate-950 border text-center text-xs font-extrabold focus:outline-none transition-all ${
                      lockState.locked 
                        ? 'border-slate-800 text-slate-500 cursor-not-allowed bg-slate-900/50' 
                        : 'border-soccer-border text-white focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary'
                    }`}
                    min="0"
                  />
                  <span className="text-[10px] text-soccer-textMuted font-bold font-mono px-0.5">:</span>
                  <input
                    type="number"
                    disabled={lockState.locked}
                    value={awayVal}
                    onChange={(e) => setAwayVal(e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value)))}
                    onBlur={handleBlur}
                    placeholder="-"
                    className={`w-9 h-8 rounded-lg bg-slate-950 border text-center text-xs font-extrabold focus:outline-none transition-all ${
                      lockState.locked 
                        ? 'border-slate-800 text-slate-500 cursor-not-allowed bg-slate-900/50' 
                        : 'border-soccer-border text-white focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary'
                    }`}
                    min="0"
                  />
                </div>
              </div>
            </div>

            {/* Away Team */}
            <div className="col-span-2 flex flex-col items-center gap-1">
              {awayCode ? (
                <img src={`https://flagcdn.com/48x36/${awayCode}.png`} alt={match.away_team_name} className="w-10 h-7 object-cover rounded shadow-md select-none mb-1" />
              ) : (
                <span className="text-3xl filter drop-shadow-md select-none">🏳️</span>
              )}
              <span className="text-xs font-bold text-slate-100 max-w-[80px] truncate leading-tight">{match.away_team_name}</span>
            </div>
          </div>

          <div className="mt-3 pt-2.5 border-t border-slate-800/60 flex justify-between items-center text-xs">
            <span className="text-soccer-textMuted font-medium flex items-center gap-1.5 font-mono">
              <Icon name="clock" className="w-3.5 h-3.5" />
              {formattedDate}
            </span>
            <span className={`font-semibold ${match.status === 'Live' ? 'text-red-400 font-bold' : 'text-slate-300'}`}>
              {getCountdownText()}
            </span>
          </div>

          {/* Points indicator */}
          {match.status === "Finished" && (
            <div className="mt-3">
              {prediction ? (
                <div className={`p-2 rounded-xl text-center border flex items-center justify-between text-xs ${
                  points === 5 
                    ? 'bg-amber-950/40 text-amber-300 border-amber-700/50' 
                    : points === 3 
                      ? 'bg-emerald-950/40 text-emerald-300 border-emerald-700/50' 
                      : 'bg-slate-900/60 text-slate-400 border-slate-800'
                }`}>
                  <span className="font-medium">
                    Tu Pred: <span className="font-bold font-mono">{prediction.homeScore} - {prediction.awayScore}</span>
                  </span>
                  <span className="font-extrabold uppercase tracking-wide">
                    {points === 5 && "⭐ +5 pts (Marcador)"}
                    {points === 3 && "✓ +3 pts (Resultado)"}
                    {points === 0 && "✗ +0 pts (Fallido)"}
                  </span>
                </div>
              ) : (
                <div className="p-2 rounded-xl text-center border bg-slate-900/60 text-slate-650 border-slate-800 text-xs">
                  Sin pronóstico (0 pts)
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ----------------------------------------------------
    // COMPONENT: GROUP STANDINGS (POSICIONES DE GRUPOS)
    // ----------------------------------------------------
    function PositionsTab({ matches }) {
      const groupLetters = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];

      const standingsByGroup = useMemo(() => {
        // Initialize tables
        const tables = {};
        groupLetters.forEach(l => {
          tables[l] = {};
        });

        // Initialize team stats
        Object.entries(TEAM_GROUPS).forEach(([team, letter]) => {
          tables[letter][team] = {
            name: team,
            played: 0, won: 0, drawn: 0, lost: 0,
            goalsFor: 0, goalsAgainst: 0, goalDiff: 0, points: 0
          };
        });

        // Loop matches and calculate standings
        matches.forEach(match => {
          if (match.status === "Finished" && match.home_score !== null && match.away_score !== null) {
            const hTeam = match.home_team_name;
            const aTeam = match.away_team_name;
            
            const groupLetter = TEAM_GROUPS[hTeam];
            if (groupLetter && tables[groupLetter] && tables[groupLetter][hTeam] && tables[groupLetter][aTeam]) {
              const hStats = tables[groupLetter][hTeam];
              const aStats = tables[groupLetter][aTeam];

              const hGoals = parseInt(match.home_score);
              const aGoals = parseInt(match.away_score);

              // Increment goals
              hStats.goalsFor += hGoals;
              hStats.goalsAgainst += aGoals;
              aStats.goalsFor += aGoals;
              aStats.goalsAgainst += hGoals;

              hStats.played += 1;
              aStats.played += 1;

              if (hGoals > aGoals) {
                hStats.won += 1;
                hStats.points += 3;
                aStats.lost += 1;
              } else if (hGoals < aGoals) {
                aStats.won += 1;
                aStats.points += 3;
                hStats.lost += 1;
              } else {
                hStats.drawn += 1;
                hStats.points += 1;
                aStats.drawn += 1;
                aStats.points += 1;
              }
            }
          }
        });

        // Sort each group table
        const sortedTables = {};
        groupLetters.forEach(letter => {
          const teamsArray = Object.values(tables[letter]);
          teamsArray.forEach(t => {
            t.goalDiff = t.goalsFor - t.goalsAgainst;
          });
          
          sortedTables[letter] = teamsArray.sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
            if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
            return a.name.localeCompare(b.name);
          });
        });

        return sortedTables;
      }, [matches]);

      return (
        <div className="space-y-6">
          <h2 className="text-md uppercase tracking-wider font-extrabold text-white flex items-center gap-2 display-font">
            <Icon name="list" className="w-4 h-4 text-soccer-primary" />
            Tablas de Posiciones Oficiales 2026
          </h2>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {groupLetters.map(letter => (
              <div key={letter} className="glass rounded-2xl p-4 space-y-3">
                <h3 className="text-xs font-black uppercase tracking-wider text-soccer-primary display-font border-b border-slate-800 pb-2">
                  Grupo {letter}
                </h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-[11px]">
                    <thead>
                      <tr className="text-soccer-textMuted font-bold border-b border-soccer-border/40">
                        <th className="py-1.5 w-6 text-center">#</th>
                        <th className="py-1.5 pl-1">Equipo</th>
                        <th className="py-1.5 text-center">PJ</th>
                        <th className="py-1.5 text-center">GD</th>
                        <th className="py-1.5 text-center font-bold text-white">PTS</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/30">
                      {standingsByGroup[letter].map((team, idx) => {
                        const code = TEAM_COUNTRY_CODES[team.name];
                        return (
                          <tr key={team.name} className="hover:bg-slate-800/20">
                            <td className="py-2 text-center font-mono font-bold text-soccer-textMuted">
                              {idx + 1}
                            </td>
                            <td className="py-2 pl-1 font-semibold flex items-center gap-1.5 truncate max-w-[120px]">
                              {code ? (
                                <img src={`https://flagcdn.com/16x12/${code}.png`} alt={team.name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                              ) : (
                                <span className="text-base select-none">🏳️</span>
                              )}
                              <span className="truncate">{team.name}</span>
                            </td>
                            <td className="py-2 text-center font-mono">{team.played}</td>
                            <td className="py-2 text-center font-mono text-soccer-textMuted">
                              {team.goalDiff > 0 ? `+${team.goalDiff}` : team.goalDiff}
                            </td>
                            <td className="py-2 text-center font-mono font-black text-white">{team.points}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // SUB-COMPONENTS: LEADERBOARDS & GROUPS TAB
    // ----------------------------------------------------
    function LeaderboardTab({
      groups,
      selectedGroup,
      setSelectedGroup,
      currentUser,
      handleCreateGroup,
      handleJoinGroup,
      predictions,
      matches,
      calculatePredictionScore
    }) {
      const [newGroupName, setNewGroupName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [joinError, setJoinError] = useState("");
      
      const [leaderboardData, setLeaderboardData] = useState([]);
      const [membersPredictions, setGroupMembersPredictions] = useState({});
      const [selectedUserDetail, setSelectedUserDetail] = useState(null);
      const [loadingStandings, setLoadingStandings] = useState(false);

      // Fetch group members and their predictions from database dynamically
      const fetchGroupLeaderboard = async (groupId) => {
        if (!groupId) return;
        setLoadingStandings(true);
        try {
          // 1. Fetch group members profiles
          const { data: members, error: mError } = await supabase
            .from('group_members')
            .select('user_id, joined_at, profiles:profiles(id, name, avatar)')
            .eq('group_id', groupId);

          if (mError) throw mError;
          if (!members || members.length === 0) {
            setLeaderboardData([]);
            setLoadingStandings(false);
            return;
          }

          const memberIds = members.map(m => m.user_id);

          // 2. Fetch locked/finished predictions of all group members
          const { data: preds, error: pError } = await supabase
            .from('predictions')
            .select('user_id, match_id, home_score, away_score')
            .in('user_id', memberIds);

          if (pError) throw pError;

          // Map predictions to dictionary object
          const allPreds = {};
          preds?.forEach(p => {
            allPreds[`${p.user_id}_${p.match_id}`] = {
              homeScore: p.home_score,
              awayScore: p.away_score
            };
          });

          // 3. Calculate points dynamically for each user
          const standings = members.map(m => {
            const profile = m.profiles || { name: 'Desconocido', avatar: '👤' };
            const uId = m.user_id;
            let totalPoints = 0;
            let exactMatches = 0;
            let outcomeMatches = 0;
            let missedMatches = 0;
            let totalPredicted = 0;

            matches.forEach(match => {
              if (match.status === "Finished") {
                const pred = allPreds[`${uId}_${match.id}`];
                if (pred && pred.homeScore !== null && pred.homeScore !== "") {
                  totalPredicted++;
                  const pts = calculatePredictionScore(pred, match);
                  totalPoints += pts;
                  if (pts === 5) exactMatches++;
                  else if (pts === 3) outcomeMatches++;
                  else missedMatches++;
                }
              }
            });

            return {
              userId: uId,
              name: profile.name,
              avatar: profile.avatar,
              totalPoints,
              exactMatches,
              outcomeMatches,
              missedMatches,
              totalPredicted
            };
          });

          // Sort standings: Points desc, exact matches desc, name asc
          standings.sort((a, b) => {
            if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
            if (b.exactMatches !== a.exactMatches) return b.exactMatches - a.exactMatches;
            return a.name.localeCompare(b.name);
          });

          setLeaderboardData(standings);
          setGroupMembersPredictions(allPreds);

        } catch (err) {
          console.error("Error fetching standings:", err);
        } finally {
          setLoadingStandings(false);
        }
      };

      // Load standings when selected group changes
      useEffect(() => {
        if (selectedGroup) {
          fetchGroupLeaderboard(selectedGroup);
        }
      }, [selectedGroup, matches]);

      const onSubmitCreate = (e) => {
        e.preventDefault();
        handleCreateGroup(newGroupName);
        setNewGroupName("");
      };

      const onSubmitJoin = async (e) => {
        e.preventDefault();
        setJoinError("");
        const res = await handleJoinGroup(joinCode);
        if (res && !res.success) {
          setJoinError(res.message);
        } else {
          setJoinCode("");
        }
      };

      const currentGroup = groups.find(g => g.id === selectedGroup);

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            {/* Left Sidebar */}
            <div className="space-y-6 md:col-span-1">
              
              {/* GROUPS SELECTOR */}
              <div className="glass rounded-2xl p-4 space-y-3">
                <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-primary display-font">Mis Grupos</h3>
                <div className="space-y-1.5">
                  {groups.map(g => (
                    <button
                      key={g.id}
                      onClick={() => { setSelectedGroup(g.id); setSelectedUserDetail(null); }}
                      className={`w-full text-left px-3 py-2.5 rounded-xl text-xs flex justify-between items-center transition-all ${selectedGroup === g.id ? 'bg-soccer-primary text-soccer-darker font-bold' : 'text-slate-300 hover:bg-slate-800'}`}
                    >
                      <span className="truncate">{g.name}</span>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded-md font-mono ${selectedGroup === g.id ? 'bg-soccer-darker/10 text-soccer-darker' : 'bg-slate-900 text-soccer-textMuted'}`}>
                        miembro
                      </span>
                    </button>
                  ))}
                  {groups.length === 0 && (
                    <p className="text-[10px] text-soccer-textMuted italic p-1">Aún no perteneces a ningún grupo.</p>
                  )}
                </div>
              </div>

              {/* JOIN GROUP */}
              <div className="glass rounded-2xl p-4">
                <h3 className="text-xs uppercase font-extrabold tracking-wider text-white display-font mb-3">Unirse a un Grupo</h3>
                <form onSubmit={onSubmitJoin} className="space-y-2">
                  <input
                    type="text"
                    value={joinCode}
                    onChange={(e) => setJoinCode(e.target.value)}
                    placeholder="Código de Invitación"
                    className="w-full bg-slate-950 border border-soccer-border px-3 py-2 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary"
                  />
                  {joinError && <p className="text-[10px] text-red-400 font-semibold">{joinError}</p>}
                  <button
                    type="submit"
                    className="w-full bg-slate-900 border border-soccer-border hover:border-soccer-primary hover:bg-soccer-primary hover:text-soccer-darker text-white text-xs py-2 rounded-xl transition-all font-bold"
                  >
                    Unirme con Código
                  </button>
                </form>
              </div>

              {/* CREATE GROUP */}
              <div className="glass rounded-2xl p-4">
                <h3 className="text-xs uppercase font-extrabold tracking-wider text-white display-font mb-3">Crear Grupo Nuevo</h3>
                <form onSubmit={onSubmitCreate} className="space-y-2">
                  <input
                    type="text"
                    value={newGroupName}
                    onChange={(e) => setNewGroupName(e.target.value)}
                    placeholder="Nombre del Grupo"

              {/* USER DETAILS DRAWER */}
              {selectedUserDetail && (

                        <h3 className="font-bold text-white">Pronósticos de {selectedUserDetail.name}</h3>

                    <button

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[350px] overflow-y-auto pr-1">

                      const pred = membersPredictions[predKey];
                      const pts = calculatePredictionScore(pred, m);

                      return (
                        <div key={m.id} className="bg-soccer-darker/60 border border-slate-800 rounded-xl p-3 flex justify-between items-center text-xs">

                            <div className="flex items-center gap-1.5 font-semibold text-slate-200">
