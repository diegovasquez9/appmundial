    // ----------------------------------------------------
    // MAIN APP COMPONENT
    // ----------------------------------------------------
    function App() {
      // Auth States
      const [session, setSession] = useState(null);
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [showResetPasswordModal, setShowResetPasswordModal] = useState(false);

      // Data States
      const [matches, _setMatches] = useState([]);
      
      const sanitizeMatchesList = (matchesList) => {
        return (matchesList || []).map(m => {
          if (m.home_score !== null && m.away_score !== null && m.status === "Scheduled") {
            supabase.from('matches').update({ status: 'Finished' }).eq('id', m.id).then(() => {});
            return { ...m, status: "Finished" };
          }
          return m;
        });
      };

      const setMatches = (list) => {
        _setMatches(sanitizeMatchesList(list));
      };
      const [predictions, setPredictions] = useState({});
      const [groups, setGroups] = useState([]);
      const [groupOverrides, setGroupOverrides] = useState([]);
      const [systemTime, setSystemTime] = useState(new Date().toISOString());
      const [isTimeSimulated, setIsTimeSimulated] = useState(false);
      
      const [activeTab, setActiveTab] = useState("dashboard");
      const [selectedGroup, setSelectedGroup] = useState("");
      const [showAdmin, setShowAdmin] = useState(false);
      
      // Save notification state
      const [saveStatus, setSaveStatus] = useState({ visible: false, message: "" });

      // Trigger temporary visual auto-save toast
      const triggerSaveToast = (msg) => {
        setSaveStatus({ visible: true, message: msg });
        setTimeout(() => {
          setSaveStatus({ visible: false, message: "" });
        }, 2000);
      };

      // 1. SUPABASE AUTH LISTENER
      useEffect(() => {
        // Get initial session
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) {
            setUser(session.user);
            fetchUserData(session.user.id);
          } else {
            setAuthLoading(false);
          }
        });

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
          setSession(session);
          if (event === "PASSWORD_RECOVERY") {
            setShowResetPasswordModal(true);
          }
          if (session) {
            setUser(session.user);
            fetchUserData(session.user.id);
          } else {
            setUser(null);
            setProfile(null);
            setPredictions({});
            setGroups([]);
            setAuthLoading(false);
          }
        });

        // Setup real time clock tick if not simulated
        const timer = setInterval(() => {
          if (!isTimeSimulated) {
            setSystemTime(new Date().toISOString());
          }
        }, 30000); // every 30s

        return () => {
          subscription.unsubscribe();
          clearInterval(timer);
        };
      }, [isTimeSimulated]);

      // 2. SUPABASE REALTIME SUBSCRIPTION FOR MATCHES, PREDICTIONS, PROFILE & OVERRIDES
      useEffect(() => {
        if (!user) return;

        // Subscribing to matches changes
        const matchesChannel = supabase
          .channel('realtime-matches')
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'matches' },
            (payload) => {
              if (payload.eventType === 'INSERT') {
                _setMatches(prev => sanitizeMatchesList([...prev, payload.new]));
              } else if (payload.eventType === 'UPDATE') {
                _setMatches(prev => sanitizeMatchesList(prev.map(m => m.id === payload.new.id ? payload.new : m)));
              } else if (payload.eventType === 'DELETE') {
                _setMatches(prev => prev.filter(m => m.id !== payload.old.id));
              }
            }
          )
          .subscribe();

        // Subscribing to current user's predictions changes
        const predictionsChannel = supabase
          .channel(`user-predictions-${user.id}`)
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'predictions', filter: `user_id=eq.${user.id}` },
            (payload) => {
              if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                const p = payload.new;
                setPredictions(prev => ({
                  ...prev,
                  [`${user.id}_${p.match_id}`]: {
                    homeScore: p.home_score,
                    awayScore: p.away_score
                  }
                }));
              } else if (payload.eventType === 'DELETE') {
                const p = payload.old;
                setPredictions(prev => {
                  const clone = { ...prev };
                  delete clone[`${user.id}_${p.match_id}`];
                  return clone;
                });
              }
            }
          )
          .subscribe();

        // Subscribing to current user's profile changes
        const profileChannel = supabase
          .channel(`user-profile-${user.id}`)
          .on(
            'postgres_changes',
            { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${user.id}` },
            (payload) => {
              setProfile(payload.new);
            }
          )
          .subscribe();

        // Subscribing to group overrides changes
        const overridesChannel = supabase
          .channel('realtime-group-overrides')
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'group_overrides' },
            (payload) => {
              if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                setGroupOverrides(prev => {
                  const clean = prev.filter(o => !(o.group_letter === payload.new.group_letter && o.team_name === payload.new.team_name));
                  return [...clean, payload.new];
                });
              } else if (payload.eventType === 'DELETE') {
                setGroupOverrides(prev => prev.filter(o => !(o.group_letter === payload.old.group_letter && o.team_name === payload.old.team_name)));
              }
            }
          )
          .subscribe();

        return () => {
          supabase.removeChannel(matchesChannel);
          supabase.removeChannel(predictionsChannel);
          supabase.removeChannel(profileChannel);
          supabase.removeChannel(overridesChannel);
        };
      }, [user]);

      // Fetch all database records related to the user
      const fetchUserData = async (userId) => {
        try {
          setAuthLoading(true);

          // a. Profile
          const { data: profileData, error: profileErr } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', userId)
            .maybeSingle();

          if (profileErr) throw profileErr;
          setProfile(profileData);
          if (profileData && !profileData.has_completed_onboarding) {
            setShowOnboarding(true);
          }

          // b. Matches
          const { data: matchesData, error: matchesErr } = await supabase
            .from('matches')
            .select('*')
            .order('date');

          if (matchesErr) throw matchesErr;
          setMatches(matchesData || []);

          // c. Predictions (only current user's predictions are returned under user_id)
          const { data: predsData, error: predsErr } = await supabase
            .from('predictions')
            .select('*')
            .eq('user_id', userId);

          if (predsErr) throw predsErr;
          
          const predObj = {};
          predsData?.forEach(p => {
            predObj[`${userId}_${p.match_id}`] = {
              homeScore: p.home_score,
              awayScore: p.away_score
            };
          });
          setPredictions(predObj);

          // d. User Groups
          const { data: memberships, error: memberErr } = await supabase
            .from('group_members')
            .select('group_id')
            .eq('user_id', userId);

          if (memberErr) throw memberErr;

          if (memberships && memberships.length > 0) {
            const groupIds = memberships.map(m => m.group_id);
            const { data: groupsData, error: groupsErr } = await supabase
              .from('groups')
              .select('*')
              .in('id', groupIds);
            
            if (groupsErr) throw groupsErr;
            setGroups(groupsData || []);
            
            if (groupsData && groupsData.length > 0) {
              setSelectedGroup(groupsData[0].id);
            }
          } else {
            setGroups([]);
          }

          // e. Group Overrides
          const { data: overridesData, error: overridesErr } = await supabase
            .from('group_overrides')
            .select('*');

          if (overridesErr) throw overridesErr;
          setGroupOverrides(overridesData || []);

        } catch (err) {
          console.error("Error loading user data from Supabase:", err);
          triggerSaveToast("Error al cargar datos de Supabase: " + err.message);
        } finally {
          setAuthLoading(false);
        }
      };

      // ----------------------------------------------------
      // AUTH ACTIONS
      // ----------------------------------------------------
      const handleLogout = async () => {
        setAuthLoading(true);
        const { error } = await supabase.auth.signOut();
        if (error) {
          triggerSaveToast(`Error de cierre: ${error.message}`);
          setAuthLoading(false);
        } else {
          triggerSaveToast("Sesión cerrada");
        }
      };

      // ----------------------------------------------------
      // ONBOARDING ACTIONS
      // ----------------------------------------------------
      const handleCompleteOnboarding = async () => {
        setShowOnboarding(false);
        if (profile) {
          setProfile(prev => ({ ...prev, has_completed_onboarding: true }));
          try {
            await supabase
              .from('profiles')
              .update({ has_completed_onboarding: true })
              .eq('id', user.id);
          } catch (err) {
            console.error("Error updating onboarding status:", err);
          }
        }
      };

      // ----------------------------------------------------
      // GROUP MANAGEMENT
      // ----------------------------------------------------
      const handleCreateGroup = async (groupName) => {
        if (!groupName.trim()) return;
        try {
          const code = "GRP-" + Math.random().toString(36).substring(2, 6).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
          
          // 1. Create group
          const { data: groupData, error: groupErr } = await supabase
            .from('groups')
            .insert({
              name: groupName,
              code: code,
              created_by: user.id
            })
            .select()
            .single();

          if (groupErr) throw groupErr;

          // 2. Add creator as member
          const { error: memberErr } = await supabase
            .from('group_members')
            .insert({
              group_id: groupData.id,
              user_id: user.id
            });

          if (memberErr) throw memberErr;

          // 3. Reload Groups
          const updatedGroups = [...groups, groupData];
          setGroups(updatedGroups);
          setSelectedGroup(groupData.id);
          triggerSaveToast(`Grupo "${groupName}" creado con éxito`);

        } catch (err) {
          console.error("Error creating group:", err);
          triggerSaveToast(`Error: ${err.message}`);
        }
      };

      const handleJoinGroup = async (code) => {
        if (!code.trim()) return { success: false, message: "Código inválido" };
        try {
          const normalizedCode = code.trim().toUpperCase();
          
          // 1. Fetch group by code
          const { data: group, error: fetchErr } = await supabase
            .from('groups')
            .select('*')
            .eq('code', normalizedCode)
            .maybeSingle();

          if (fetchErr) throw fetchErr;
          if (!group) return { success: false, message: "Código de grupo no encontrado" };

          // 2. Check if already member
          if (groups.some(g => g.id === group.id)) {
            return { success: false, message: "Ya eres miembro de este grupo" };
          }

          // 3. Insert membership
          const { error: joinErr } = await supabase
            .from('group_members')
            .insert({
              group_id: group.id,
              user_id: user.id
            });

          if (joinErr) throw joinErr;

          // 4. Reload Groups
          const updatedGroups = [...groups, group];
          setGroups(updatedGroups);
          setSelectedGroup(group.id);
          triggerSaveToast(`Te has unido al grupo ${group.name}`);
          return { success: true };

        } catch (err) {
          console.error("Error joining group:", err);
          return { success: false, message: `Error: ${err.message}` };
        }
      };

      // ----------------------------------------------------
      // PREDICTIONS AUTO-SAVE ON BLUR
      // ----------------------------------------------------
      const handleSavePrediction = async (matchId, homeScore, awayScore) => {
        if (homeScore === "" || awayScore === "") return; // Don't save incomplete predictions

        const predKey = `${user.id}_${matchId}`;
        const match = matches.find(m => m.id === matchId);
        if (!match) return;

        // Perform local locking check
        const kickoff = new Date(match.date);
        const sysTime = new Date(systemTime);
        const diffMins = (kickoff.getTime() - sysTime.getTime()) / (1000 * 60);
        if (diffMins <= 10) {
          triggerSaveToast("Error: Las predicciones están cerradas (límite 10 min)");
          return;
        }

        // Optimistic UI state update
        setPredictions(prev => ({
          ...prev,
          [predKey]: { homeScore, awayScore }
        }));

        try {
          // Upsert in Supabase (will fail under RLS if DB time is within 10 min of kickoff)
          const { error } = await supabase
            .from('predictions')
            .upsert({
              user_id: user.id,
              match_id: matchId,
              home_score: parseInt(homeScore),
              away_score: parseInt(awayScore),
              updated_at: new Date().toISOString()
            }, { onConflict: 'user_id,match_id' });

          if (error) throw error;
          triggerSaveToast("Pronóstico guardado");
        } catch (err) {
          console.error("Supabase upsert error:", err);
          triggerSaveToast(`Error de base de datos: ${err.message}`);
          
          // Revert optimistic update by fetching original predictions again
          const { data: originalPred } = await supabase
            .from('predictions')
            .select('*')
            .eq('user_id', user.id)
            .eq('match_id', matchId)
            .maybeSingle();

          if (originalPred) {
            setPredictions(prev => ({
              ...prev,
              [predKey]: { homeScore: originalPred.home_score, awayScore: originalPred.away_score }
            }));
          } else {
            setPredictions(prev => {
              const clone = { ...prev };
              delete clone[predKey];
              return clone;
            });
          }
        }
      };

      // ----------------------------------------------------
      // ADMIN METHODS (SYNCING & TIME TRAVEL)
      // ----------------------------------------------------
      const handleAdminUpdateMatch = async (matchId, data) => {
        try {
          const matchObj = matches.find(m => m.id === matchId);
          const isKnockout = matchObj && !matchObj.stage.includes("Grupo");
          const isDraw = data.homeScore !== "" && data.homeScore !== null && data.awayScore !== "" && data.awayScore !== null && parseInt(data.homeScore) === parseInt(data.awayScore);
          const pWinner = (isKnockout && isDraw) ? data.penaltiesWinner : null;

          const { error } = await supabase
            .from('matches')
            .update({
              home_score: data.homeScore === "" || data.homeScore === null ? null : parseInt(data.homeScore),
              away_score: data.awayScore === "" || data.awayScore === null ? null : parseInt(data.awayScore),
              status: data.status,
              penalties_winner: pWinner
            })
            .eq('id', matchId);

          if (error) throw error;

          // Reload matches
          const updatedMatches = matches.map(m => {
            if (m.id === matchId) {
              return {
                ...m,
                home_score: data.homeScore === "" || data.homeScore === null ? null : parseInt(data.homeScore),
                away_score: data.awayScore === "" || data.awayScore === null ? null : parseInt(data.awayScore),
                status: data.status,
                penalties_winner: pWinner
              };
            }
            return m;
          });
          setMatches(updatedMatches);
          triggerSaveToast("Resultado actualizado en Supabase");
        } catch (err) {
          triggerSaveToast(`Error al actualizar resultado: ${err.message}`);
        }
      };

      const handleAdminSimulateGroupStage = async () => {
        triggerSaveToast("Simulando fase de grupos...");
        try {
          const groupMatches = matches.filter(m => m.stage.includes("Grupo"));
          
          const updates = groupMatches.map(m => {
            const hScore = Math.floor(Math.random() * 4); // 0-3 goals
            const aScore = Math.floor(Math.random() * 4);
            return {
              id: m.id,
              home_score: hScore,
              away_score: aScore,
              status: "Finished"
            };
          });

          // Concurrently update all 72 group matches in Supabase
          const promises = updates.map(upd => 
            supabase
              .from('matches')
              .update({
                home_score: upd.home_score,
                away_score: upd.away_score,
                status: "Finished"
              })
              .eq('id', upd.id)
          );

          await Promise.all(promises);

          // Reload matches list from Supabase
          const { data: refreshedMatches, error: reloadErr } = await supabase
            .from('matches')
            .select('*')
            .order('date');

          if (reloadErr) throw reloadErr;
          
          setMatches(refreshedMatches || []);
          triggerSaveToast("¡Fase de grupos simulada con éxito!");
        } catch (err) {
          triggerSaveToast(`Error en la simulación: ${err.message}`);
        }
      };

      const handleAdminResetAllScores = async () => {
        triggerSaveToast("Reiniciando todos los marcadores...");
        try {
          const promises = matches.map(m => 
            supabase
              .from('matches')
              .update({
                home_score: null,
                away_score: null,
                status: "Scheduled",
                api_fixture_id: null
              })
              .eq('id', m.id)
          );

          await Promise.all(promises);

          // Reload matches list from Supabase
          const { data: refreshedMatches, error: reloadErr } = await supabase
            .from('matches')
            .select('*')
            .order('date');

          if (reloadErr) throw reloadErr;

          setMatches(refreshedMatches || []);
          triggerSaveToast("¡Todos los marcadores han sido reiniciados!");
        } catch (err) {
          triggerSaveToast(`Error al reiniciar marcadores: ${err.message}`);
        }
      };

      const handleAdminUpdateGroupOverrides = async (groupLetter, teamOrder) => {
        try {
          if (teamOrder === null) {
            triggerSaveToast(`Restaurando posiciones del Grupo ${groupLetter}...`);
            const { error } = await supabase
              .from('group_overrides')
              .delete()
              .eq('group_letter', groupLetter);
            
            if (error) throw error;
            
            setGroupOverrides(prev => prev.filter(o => o.group_letter !== groupLetter));
            triggerSaveToast(`Grupo ${groupLetter} restaurado a cálculo automático`);
            return;
          }

          triggerSaveToast(`Guardando posiciones del Grupo ${groupLetter}...`);

          const upserts = teamOrder.map((teamName, index) => ({
            group_letter: groupLetter,
            team_name: teamName,
            manual_rank: index + 1
          }));

          const { error } = await supabase
            .from('group_overrides')
            .upsert(upserts, { onConflict: 'group_letter,team_name' });

          if (error) throw error;

          // Local state update
          setGroupOverrides(prev => {
            const clean = prev.filter(o => o.group_letter !== groupLetter);
            return [...clean, ...upserts];
          });
          triggerSaveToast(`Posiciones del Grupo ${groupLetter} actualizadas con éxito`);
        } catch (err) {
          triggerSaveToast(`Error al guardar posiciones: ${err.message}`);
        }
      };

      // ----------------------------------------------------
      // SCORING & DYNAMIC STANDINGS
      // ----------------------------------------------------
      // 10-Minute Lock Rule Helper
      const getMatchLockState = (match, sysTimeStr) => {
        if (match.status === "Finished" || match.status === "Live") {
          return { locked: true, reason: match.status === "Finished" ? "Finalizado" : "En Vivo" };
        }
        const sysTime = new Date(sysTimeStr);
        const kickoff = new Date(match.date);
        
        const diffMs = kickoff.getTime() - sysTime.getTime();
        const diffMins = Math.floor(diffMs / (1000 * 60));
        
        if (diffMins <= 10) {
          return { locked: true, reason: diffMins < 0 ? "Iniciado" : "Cerrado" };
        }
        return { locked: false, diffMins };
      };

      // Scoring Algorithm
      const calculatePredictionScore = (pred, match) => {
        if (match.status !== "Finished") return null;
        if (!pred || pred.homeScore === null || pred.homeScore === "" || pred.awayScore === null || pred.awayScore === "") return 0;

        const pHome = parseInt(pred.homeScore);
        const pAway = parseInt(pred.awayScore);
        const mHome = parseInt(match.home_score);
        const mAway = parseInt(match.away_score);

        // Rule 1: Exact Match (5 Points)
        if (pHome === mHome && pAway === mAway) {
          return 5;
        }

        // Rule 2: Outcome + Goal Difference for Wins (4 Points)
        const pDiff = pHome - pAway;
        const mDiff = mHome - mAway;

        if ((pDiff > 0 && mDiff > 0) || (pDiff < 0 && mDiff < 0)) {
          if (pDiff === mDiff) {
            return 4;
          }
          return 3;
        }

        // Rule 3: Outcome for Draws (3 Points)
        if (pDiff === 0 && mDiff === 0) {
          return 3;
        }

        // Rule 4: No Match (0 Points)
        return 0;
      };

      // Dynamic bracket progression resolution for Round of 32, Round of 16, Quarters, Semis, and Finals
      const resolvedTeamsMap = useMemo(() => {
        const resolution = {};

        // Create overrides map for quick lookup
        const overridesMap = {};
        groupOverrides?.forEach(o => {
          overridesMap[`${o.group_letter}_${o.team_name}`] = o.manual_rank;
        });

        // 1. Group Standings Calculation
        const groupLetters = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
        const tables = {};
        groupLetters.forEach(l => { tables[l] = {}; });

        Object.entries(TEAM_GROUPS).forEach(([team, letter]) => {
          tables[letter][team] = {
            name: team,
            played: 0, won: 0, drawn: 0, lost: 0,
            goalsFor: 0, goalsAgainst: 0, points: 0
          };
        });

        matches.forEach(match => {
          if (match.stage.includes("Grupo") && match.status === "Finished" && match.home_score !== null && match.away_score !== null) {
            const hTeam = match.home_team_name;
            const aTeam = match.away_team_name;
            const groupLetter = TEAM_GROUPS[hTeam];
            if (groupLetter && tables[groupLetter] && tables[groupLetter][hTeam] && tables[groupLetter][aTeam]) {
              const hStats = tables[groupLetter][hTeam];
              const aStats = tables[groupLetter][aTeam];
              const hGoals = parseInt(match.home_score);
              const aGoals = parseInt(match.away_score);

              hStats.goalsFor += hGoals;
              hStats.goalsAgainst += aGoals;
              aStats.goalsFor += aGoals;
              aStats.goalsAgainst += hGoals;
              hStats.played += 1;
              aStats.played += 1;

              if (hGoals > aGoals) {
                hStats.won += 1;
                hStats.points += 3;
                aStats.lost += 1;
              } else if (hGoals < aGoals) {
                aStats.won += 1;
                aStats.points += 3;
                hStats.lost += 1;
              } else {
                hStats.drawn += 1;
                hStats.points += 1;
                aStats.drawn += 1;
                aStats.points += 1;
              }
            }
          }
        });

        // Get 1st, 2nd, and 3rd place teams per group
        const groupThirds = [];
        groupLetters.forEach(letter => {
          const teamsArray = Object.values(tables[letter]).map(t => {
            t.goalDiff = t.goalsFor - t.goalsAgainst;
            return t;
          });

          // Sort by overrides if present, otherwise by points desc, goalDiff desc, goalsFor desc, name asc
          teamsArray.sort((a, b) => {
            const rankA = overridesMap[`${letter}_${a.name}`];
            const rankB = overridesMap[`${letter}_${b.name}`];
            if (rankA !== undefined && rankB !== undefined) {
              return rankA - rankB; // manual_rank 1 is first, 2 is second, etc.
            }
            if (b.points !== a.points) return b.points - a.points;
            if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
            if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
            return a.name.localeCompare(b.name);
          });

          // Assign 1st and 2nd places
          if (teamsArray[0] && teamsArray[0].played > 0) {
            resolution[`1${letter}`] = teamsArray[0].name;
          } else {
            resolution[`1${letter}`] = `1${letter}`;
          }

          if (teamsArray[1] && teamsArray[1].played > 0) {
            resolution[`2${letter}`] = teamsArray[1].name;
          } else {
            resolution[`2${letter}`] = `2${letter}`;
          }

          if (teamsArray[2]) {
            groupThirds.push({
              name: teamsArray[2].name,
              group: letter,
              played: teamsArray[2].played,
              points: teamsArray[2].points,
              goalDiff: teamsArray[2].goalDiff,
              goalsFor: teamsArray[2].goalsFor
            });
          }
        });

        // Find the 8 best 3rd place teams
        groupThirds.sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
          if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
          return a.name.localeCompare(b.name);
        });

        const bestThirds = groupThirds.filter(t => t.played > 0).slice(0, 8);

        // Collect all third place placeholders (slots)
        const thirdSlots = [];
        matches.forEach(m => {
          if (m.home_team_name.startsWith("3rd ") && !thirdSlots.includes(m.home_team_name)) {
            thirdSlots.push(m.home_team_name);
          }
          if (m.away_team_name.startsWith("3rd ") && !thirdSlots.includes(m.away_team_name)) {
            thirdSlots.push(m.away_team_name);
          }
        });

        // Resolve third places using maximum bipartite matching to avoid deadlocks
        const allowedMap = {};
        thirdSlots.forEach(slot => {
          allowedMap[slot] = slot.replace("3rd ", "").split("/");
        });

        // matching: map from slot string to team object
        const matching = {};
        const visited = new Set();

        const dfs = (team) => {
          for (const slot of thirdSlots) {
            const allowed = allowedMap[slot];
            if (allowed.includes(team.group)) {
              if (visited.has(slot)) continue;
              visited.add(slot);

              const currentMatchedTeam = matching[slot];
              if (!currentMatchedTeam || dfs(currentMatchedTeam)) {
                matching[slot] = team;
                return true;
              }
            }
          }
          return false;
        };

        // Try to match each best-third team to an allowed slot
        bestThirds.forEach(team => {
          visited.clear();
          dfs(team);
        });

        // Find unused teams (not in matching values)
        const matchedTeamNames = new Set(Object.values(matching).map(t => t.name));
        const unusedTeams = bestThirds.filter(t => !matchedTeamNames.has(t.name));

        // Assign to resolution map
        thirdSlots.forEach(slot => {
          if (matching[slot]) {
            resolution[slot] = matching[slot].name;
          } else if (unusedTeams.length > 0) {
            const fallbackTeam = unusedTeams.shift();
            resolution[slot] = fallbackTeam.name;
          } else {
            resolution[slot] = slot; // Fixes doubling prefix bug (e.g. returns "3rd E/F/G/I/J" instead of "3rd 3rd E/F/G/I/J")
          }
        });

        // 2. Resolve Knockout Progression (Winners & Losers)
        // 5 passes to propagate winners from R32 down to Finals
        for (let pass = 0; pass < 5; pass++) {
          matches.forEach(m => {
            const mIdNumber = m.id.replace("m", "");
            
            const hResolvedName = resolution[m.home_team_name] || m.home_team_name;
            const aResolvedName = resolution[m.away_team_name] || m.away_team_name;

            let winner = `Ganador ${mIdNumber}`;
            let loser = `Perdedor ${mIdNumber}`;

            if (m.status === "Finished" && m.home_score !== null && m.away_score !== null) {
              const hScore = parseInt(m.home_score);
              const aScore = parseInt(m.away_score);
              if (hScore > aScore) {
                winner = hResolvedName;
                loser = aResolvedName;
              } else if (aScore > hScore) {
                winner = aResolvedName;
                loser = hResolvedName;
              } else if (hScore === aScore) {
                if (m.penalties_winner === "home") {
                  winner = hResolvedName;
                  loser = aResolvedName;
                } else if (m.penalties_winner === "away") {
                  winner = aResolvedName;
                  loser = hResolvedName;
                }
              }
            }

            resolution[`Ganador ${mIdNumber}`] = winner;
            resolution[`Perdedor ${mIdNumber}`] = loser;
          });
        }

        return resolution;
      }, [matches, groupOverrides]);

      const resolvedMatches = useMemo(() => {
        return matches.map(m => {
          return {
            ...m,
            home_team_name: resolvedTeamsMap[m.home_team_name] || m.home_team_name,
            away_team_name: resolvedTeamsMap[m.away_team_name] || m.away_team_name
          };
        });
      }, [matches, resolvedTeamsMap]);

      // Calculate stats for current active user
      const currentUserStats = useMemo(() => {
        if (!user) return { points: 0, exacts: 0, outcomes: 0, missed: 0, predictedCount: 0 };
        let points = 0;
        let exacts = 0;
        let outcomes = 0;
        let missed = 0;
        let predictedCount = 0;

        resolvedMatches.forEach(m => {
          const pred = predictions[`${user.id}_${m.id}`];
          const hasPrediction = pred && pred.homeScore !== "" && pred.awayScore !== "";

          if (hasPrediction) predictedCount++;
          
          if (m.status === "Finished") {
            const pts = calculatePredictionScore(pred, m);
            if (pts !== null) {
              points += pts;
              if (pts === 5) exacts++;
              else if (pts === 3 || pts === 4) outcomes++;
              else missed++;
            }
          }
        });

        return { points, exacts, outcomes, missed, predictedCount };
      }, [user, resolvedMatches, predictions]);

      // Horizontal list of matches scheduled for today (timezone aware)
      const todayMatches = useMemo(() => {
        const getLocalDateString = (dateObj) => {
          const yyyy = dateObj.getFullYear();
          const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
          const dd = String(dateObj.getDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}`;
        };
        const sysDate = new Date(systemTime);
        const sysDateString = getLocalDateString(sysDate);
        return resolvedMatches.filter(m => {
          const matchDate = new Date(m.date);
          return getLocalDateString(matchDate) === sysDateString;
        });
      }, [resolvedMatches, systemTime]);

      if (authLoading) {
        return (
          <div className="flex-1 flex flex-col justify-center items-center bg-soccer-darker h-screen text-slate-400">
            <Icon name="soccerBall" className="w-12 h-12 text-soccer-primary animate-spin-slow mb-4" />
            <p className="text-xs uppercase tracking-widest font-extrabold display-font">Conectando a Supabase...</p>
          </div>
        );
      }

      // If not logged in, render the Auth landing page
      if (!session) {
        return <AuthScreen supabase={supabase} triggerSaveToast={triggerSaveToast} />;
      }

      return (
        <div className="flex-1 flex flex-col min-h-screen pb-12">
          
          {/* HEADER */}
          <header className="sticky top-0 z-40 glass border-b border-soccer-border px-4 py-3 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-2">
              <div className="bg-gradient-to-br from-soccer-primary to-emerald-700 p-2 rounded-xl shadow-inner shadow-soccer-primaryGlow/50">
                <Icon name="soccerBall" className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight display-font text-white leading-none">MUNDIAL '26</h1>
                <span className="text-[10px] uppercase font-bold tracking-wider text-soccer-primary">Quiniela / Polla</span>
              </div>
            </div>

            {/* Time Travel Display & Indicator */}
            <div className="hidden md:flex items-center gap-2 bg-soccer-darker px-3 py-1.5 rounded-full border border-slate-800">
              <span className="relative flex h-2 w-2">
                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isTimeSimulated ? 'bg-soccer-accent' : 'bg-soccer-primary'}`}></span>
                <span className={`relative inline-flex rounded-full h-2 w-2 ${isTimeSimulated ? 'bg-soccer-accent' : 'bg-soccer-primary'}`}></span>
              </span>
              <span className="text-xs font-semibold text-slate-300 flex items-center gap-1.5">

    // ----------------------------------------------------
    // COMPONENT: MATCH CARD (REAL INTEGRATION)
    // ----------------------------------------------------
    function MatchCard({
      match,
      prediction,
      systemTime,
      getMatchLockState,
      calculatePredictionScore,
      onSave
    }) {
      const lockState = getMatchLockState(match, systemTime);
      const points = calculatePredictionScore(prediction, match);

      const [homeVal, setHomeVal] = useState(prediction?.homeScore !== undefined ? prediction.homeScore : "");
      const [awayVal, setAwayVal] = useState(prediction?.awayScore !== undefined ? prediction.awayScore : "");

      // Sync local state if prediction from DB changes
      useEffect(() => {
        setHomeVal(prediction?.homeScore !== undefined ? prediction.homeScore : "");
        setAwayVal(prediction?.awayScore !== undefined ? prediction.awayScore : "");
      }, [prediction]);

      const handleBlur = () => {
        if (homeVal !== "" && awayVal !== "") {
          onSave(match.id, homeVal, awayVal);
        }
      };

      const kickoffDate = new Date(match.date);
      const formattedDate = kickoffDate.toLocaleString('es-ES', {
        day: '2-digit',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });

      const getCountdownText = () => {
        if (match.status === "Finished") return "Finalizado";
        if (match.status === "Live") return "En Vivo";

        const diffMs = kickoffDate.getTime() - new Date(systemTime).getTime();
        const diffMins = Math.floor(diffMs / (1000 * 60));
        
        if (diffMins < 0) return "Iniciado / En espera";
        if (diffMins <= 10) return "Bloqueado";
        
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 1) return `Cierra en ${diffMins} min`;
        if (diffHours < 24) return `Cierra en ${diffHours}h ${diffMins % 60}m`;
        
        return `Empieza en ${Math.floor(diffHours / 24)}d ${diffHours % 24}h`;
      };

    // ----------------------------------------------------
    // COMPONENT: GROUP STANDINGS (POSICIONES DE GRUPOS)
    // ----------------------------------------------------
    function PositionsTab({ matches, groupOverrides }) {
      const groupLetters = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];

      const standingsByGroup = useMemo(() => {
        // Initialize tables
        const tables = {};
        groupLetters.forEach(l => {
          tables[l] = {};
        });

        // Initialize team stats
        Object.entries(TEAM_GROUPS).forEach(([team, letter]) => {
          tables[letter][team] = {
            name: team,
            played: 0, won: 0, drawn: 0, lost: 0,
            goalsFor: 0, goalsAgainst: 0, goalDiff: 0, points: 0
          };
        });

        // Loop matches and calculate standings
        matches.forEach(match => {
          if (match.status === "Finished" && match.home_score !== null && match.away_score !== null) {
            const hTeam = match.home_team_name;
            const aTeam = match.away_team_name;
            
            const groupLetter = TEAM_GROUPS[hTeam];
            if (groupLetter && tables[groupLetter] && tables[groupLetter][hTeam] && tables[groupLetter][aTeam]) {
              const hStats = tables[groupLetter][hTeam];
              const aStats = tables[groupLetter][aTeam];

              const hGoals = parseInt(match.home_score);
              const aGoals = parseInt(match.away_score);

              // Increment goals
              hStats.goalsFor += hGoals;
              hStats.goalsAgainst += aGoals;
              aStats.goalsFor += aGoals;
              aStats.goalsAgainst += hGoals;

              hStats.played += 1;
              aStats.played += 1;

              if (hGoals > aGoals) {
                hStats.won += 1;
                hStats.points += 3;
                aStats.lost += 1;
              } else if (hGoals < aGoals) {
                aStats.won += 1;
                aStats.points += 3;
                hStats.lost += 1;
              } else {
                hStats.drawn += 1;
                hStats.points += 1;
                aStats.drawn += 1;
                aStats.points += 1;
              }
            }
          }
        });

        // Create overrides map
        const overridesMap = {};
        groupOverrides?.forEach(o => {
          overridesMap[`${o.group_letter}_${o.team_name}`] = o.manual_rank;
        });

        // Sort each group table
        const sortedTables = {};
        groupLetters.forEach(letter => {
          const teamsArray = Object.values(tables[letter]);
          teamsArray.forEach(t => {
            t.goalDiff = t.goalsFor - t.goalsAgainst;
          });
          
          sortedTables[letter] = teamsArray.sort((a, b) => {
            const rankA = overridesMap[`${letter}_${a.name}`];
            const rankB = overridesMap[`${letter}_${b.name}`];
            if (rankA !== undefined && rankB !== undefined) {
              return rankA - rankB; // manual_rank 1 is first, 2 is second, etc.
            }
            if (b.points !== a.points) return b.points - a.points;
            if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
            if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
            return a.name.localeCompare(b.name);
          });
        });

        return sortedTables;
      }, [matches, groupOverrides]);

      const bestThirds = useMemo(() => {
        const thirds = [];
        Object.entries(standingsByGroup).forEach(([groupLetter, teamsArray]) => {
          const t = teamsArray[2]; // The 3rd place team
          if (t) {
            thirds.push({
              ...t,
              group: groupLetter
            });
          }
        });

        // Sort thirds: points desc, goalDiff desc, goalsFor desc, name asc
        thirds.sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
          if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
          return a.name.localeCompare(b.name);
        });

        return thirds;
      }, [standingsByGroup]);

      return (
        <div className="space-y-6">
          <h2 className="text-md uppercase tracking-wider font-extrabold text-white flex items-center gap-2 display-font">
            <Icon name="list" className="w-4 h-4 text-soccer-primary" />
            Tablas de Posiciones Oficiales 2026
          </h2>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {groupLetters.map(letter => (
              <div key={letter} className="glass rounded-2xl p-4 space-y-3">
                <h3 className="text-xs font-black uppercase tracking-wider text-soccer-primary display-font border-b border-slate-800 pb-2">
                  Grupo {letter}
                </h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-[11px]">
                    <thead>
                      <tr className="text-soccer-textMuted font-bold border-b border-soccer-border/40">
                        <th className="py-1.5 w-6 text-center">#</th>
                        <th className="py-1.5 pl-1">Equipo</th>
                        <th className="py-1.5 text-center">PJ</th>
                        <th className="py-1.5 text-center">GD</th>
                        <th className="py-1.5 text-center font-bold text-white">PTS</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/30">
                      {standingsByGroup[letter].map((team, idx) => {
                        const code = TEAM_COUNTRY_CODES[team.name];
                        return (
                          <tr key={team.name} className="hover:bg-slate-800/20">
                            <td className="py-2 text-center font-mono font-bold text-soccer-textMuted">
                              {idx + 1}
                            </td>
                            <td className="py-2 pl-1 font-semibold flex items-center gap-1.5 truncate max-w-[120px]">
                              {code ? (
                                <img src={`https://flagcdn.com/16x12/${code}.png`} alt={team.name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                              ) : (
                                <span className="text-base select-none">🏳️</span>
                              )}
                              <span className="truncate">{team.name}</span>
                            </td>
                            <td className="py-2 text-center font-mono">{team.played}</td>
                            <td className="py-2 text-center font-mono text-soccer-textMuted">
                              {team.goalDiff > 0 ? `+${team.goalDiff}` : team.goalDiff}
                            </td>
                            <td className="py-2 text-center font-mono font-black text-white">{team.points}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>

          {/* TABLA DE MEJORES TERCEROS */}
          <div className="glass rounded-2xl p-5 space-y-4 border border-soccer-accent/25">
            <div>
              <h3 className="text-xs font-black uppercase tracking-wider text-soccer-accent display-font flex items-center gap-1.5">
                <Icon name="award" className="w-4 h-4 text-soccer-accent" />
                Tabla de Mejores Terceros
              </h3>
              <p className="text-[10px] text-soccer-textMuted mt-0.5">
                Los mejores 8 terceros puestos avanzan a la Ronda de 32 (Dieciseisavos). Sombreados en verde los clasificados.
              </p>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left text-[11px]">
                <thead>
                  <tr className="text-soccer-textMuted font-bold border-b border-soccer-border/40">
                    <th className="py-2 w-8 text-center">#</th>
                    <th className="py-2 pl-2">Equipo</th>
                    <th className="py-2 text-center w-12">Grupo</th>
                    <th className="py-2 text-center w-10">PJ</th>
                    <th className="py-2 text-center w-10">GF</th>
                    <th className="py-2 text-center w-10">GD</th>
                    <th className="py-2 text-center w-12 font-bold text-white">PTS</th>
                    <th className="py-2 text-center w-24">Estado</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/30">
                  {bestThirds.map((team, idx) => {
                    const code = TEAM_COUNTRY_CODES[team.name];
                    const isQualifying = idx < 8 && team.played > 0;
                    return (
                      <tr 
                        key={team.name} 
                        className={`hover:bg-slate-800/20 transition-all ${
                          isQualifying 
                            ? 'bg-emerald-950/20 text-emerald-300 font-semibold' 
                            : team.played > 0 
                              ? 'bg-red-950/10 text-red-300' 
                              : ''
                        }`}
                      >
                        <td className="py-2 text-center font-mono font-bold">
                          {idx + 1}
                        </td>
                        <td className="py-2 pl-2 font-semibold flex items-center gap-1.5 truncate max-w-[150px]">
                          {code ? (
                            <img src={`https://flagcdn.com/16x12/${code}.png`} alt={team.name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                          ) : (
                            <span className="text-base select-none">🏳️</span>
                          )}
                          <span className="truncate">{team.name}</span>
                        </td>
                        <td className="py-2 text-center font-bold font-mono">{team.group}</td>
                        <td className="py-2 text-center font-mono">{team.played}</td>
                        <td className="py-2 text-center font-mono">{team.goalsFor}</td>
                        <td className="py-2 text-center font-mono">
                          {team.goalDiff > 0 ? `+${team.goalDiff}` : team.goalDiff}
                        </td>
                        <td className="py-2 text-center font-mono font-black">{team.points}</td>
                        <td className="py-2 text-center text-[9px] uppercase font-extrabold font-sans">
                          {isQualifying ? (
                            <span className="bg-emerald-900/50 text-emerald-400 border border-emerald-800/60 px-1.5 py-0.5 rounded">Clasificado</span>
                          ) : team.played > 0 ? (
                            <span className="bg-red-900/40 text-red-400 border border-red-950 px-1.5 py-0.5 rounded">Eliminado</span>
                          ) : (
                            <span className="text-soccer-textMuted">-</span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // SUB-COMPONENTS: LEADERBOARDS & GROUPS TAB
    // ----------------------------------------------------
    function LeaderboardTab({
      groups,
      selectedGroup,
      setSelectedGroup,
      currentUser,
      handleCreateGroup,
      handleJoinGroup,
      predictions,
      matches,
      calculatePredictionScore,
      triggerSaveToast
    }) {
      const [newGroupName, setNewGroupName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [joinError, setJoinError] = useState("");
      
      const [leaderboardData, setLeaderboardData] = useState([]);
      const [membersPredictions, setGroupMembersPredictions] = useState({});
      const [selectedUserDetail, setSelectedUserDetail] = useState(null);
      const [loadingStandings, setLoadingStandings] = useState(false);

      // Fetch group members and their predictions from database dynamically
      const fetchGroupLeaderboard = async (groupId) => {
        if (!groupId) return;
        setLoadingStandings(true);
        try {
          // 1. Fetch group members profiles
          const { data: members, error: mError } = await supabase
            .from('group_members')
            .select('user_id, joined_at, profiles:profiles(id, name, avatar)')
            .eq('group_id', groupId);

          if (mError) throw mError;
          if (!members || members.length === 0) {
            setLeaderboardData([]);
            setLoadingStandings(false);
            return;
          }

          const memberIds = members.map(m => m.user_id);

          // 2. Fetch locked/finished predictions of all group members
          const { data: preds, error: pError } = await supabase
            .from('predictions')
            .select('user_id, match_id, home_score, away_score')
            .in('user_id', memberIds);

          if (pError) throw pError;

          // Map predictions to dictionary object
          const allPreds = {};
          preds?.forEach(p => {
            allPreds[`${p.user_id}_${p.match_id}`] = {
              homeScore: p.home_score,
              awayScore: p.away_score
            };
          });

          // 3. Calculate points dynamically for each user
          const standings = members.map(m => {
            const profile = m.profiles || { name: 'Desconocido', avatar: '👤' };
            const uId = m.user_id;
            let totalPoints = 0;
            let exactMatches = 0;
            let outcomeMatches = 0;
            let missedMatches = 0;
            let totalPredicted = 0;

            matches.forEach(match => {
              if (match.status === "Finished") {
                const pred = allPreds[`${uId}_${match.id}`];
                if (pred && pred.homeScore !== null && pred.homeScore !== "") {
                  totalPredicted++;
                  const pts = calculatePredictionScore(pred, match);
                  totalPoints += pts;
                  if (pts === 5) exactMatches++;
                  else if (pts === 3 || pts === 4) outcomeMatches++;
                  else missedMatches++;
                }
              }
            });

            return {
              userId: uId,
              name: profile.name,
              avatar: profile.avatar,
              totalPoints,
              exactMatches,
              outcomeMatches,
              missedMatches,
              totalPredicted
            };
          });

          // Sort standings: Points desc, exact matches desc, name asc
          standings.sort((a, b) => {
            if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
            if (b.exactMatches !== a.exactMatches) return b.exactMatches - a.exactMatches;
            return a.name.localeCompare(b.name);
          });

          setLeaderboardData(standings);
          setGroupMembersPredictions(allPreds);

        } catch (err) {
          console.error("Error fetching standings:", err);
        } finally {
          setLoadingStandings(false);
        }
      };

      // Load standings when selected group changes
      useEffect(() => {
        if (selectedGroup) {
          fetchGroupLeaderboard(selectedGroup);
        }
      }, [selectedGroup, matches]);

      // Realtime subscription for group members updates, predictions updates, and profile updates
      useEffect(() => {
        if (!selectedGroup) return;

        const groupRealtimeChannel = supabase
          .channel(`group-updates-${selectedGroup}`)
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'predictions' },
            () => {
              fetchGroupLeaderboard(selectedGroup);
            }
          )
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'group_members' },
            () => {
              fetchGroupLeaderboard(selectedGroup);
            }
          )
          .on(
            'postgres_changes',
            { event: 'UPDATE', schema: 'public', table: 'profiles' },
            () => {
              fetchGroupLeaderboard(selectedGroup);
            }
          )
          .subscribe();

        return () => {
          supabase.removeChannel(groupRealtimeChannel);
        };
      }, [selectedGroup]);


      const onSubmitCreate = (e) => {
        e.preventDefault();
        handleCreateGroup(newGroupName);
        setNewGroupName("");
      };

      const onSubmitJoin = async (e) => {
        e.preventDefault();
        setJoinError("");
        const res = await handleJoinGroup(joinCode);
        if (res && !res.success) {
          setJoinError(res.message);
        } else {
          setJoinCode("");
        }
      };

      const currentGroup = groups.find(g => g.id === selectedGroup);

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
            
            {/* GROUPS SELECTOR */}
            <div className="glass rounded-2xl p-4 space-y-3 md:col-span-1 md:row-start-1">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-primary display-font">Mis Grupos</h3>
              <div className="space-y-1.5">
                {groups.map(g => (
                  <button
                    key={g.id}
                    onClick={() => { setSelectedGroup(g.id); setSelectedUserDetail(null); }}

    function ResetPasswordModal({ onClose, supabase, triggerSaveToast }) {
      const [newPassword, setNewPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErrorMsg("");
        if (newPassword.length < 6) {
          setErrorMsg("La contraseña debe tener al menos 6 caracteres");
          return;
        }
        if (newPassword !== confirmPassword) {
          setErrorMsg("Las contraseñas no coinciden");
          return;
        }

        setLoading(true);
        try {
          const { error } = await supabase.auth.updateUser({ password: newPassword });
          if (error) throw error;
          triggerSaveToast("Contraseña restablecida exitosamente");
          onClose();
        } catch (err) {
          setErrorMsg(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-soccer-darker/90 backdrop-blur-md p-4 animate-fade-in">
          <div className="glass max-w-md w-full rounded-3xl p-6 md:p-8 border border-soccer-border shadow-2xl relative flex flex-col space-y-4">
            <div className="flex items-center gap-3 border-b border-soccer-border pb-3">
              <div className="bg-gradient-to-br from-soccer-accent to-amber-700 p-2.5 rounded-xl shadow-inner shadow-soccer-accentGlow/30">
                <Icon name="lock" className="w-6 h-6 text-white" />
              </div>
              <div>
                <h3 className="text-md md:text-lg font-black uppercase tracking-tight display-font text-white">Restablecer Contraseña</h3>
                <span className="text-[9px] uppercase font-bold tracking-wider text-soccer-accent">Establece tu nueva clave de acceso</span>
              </div>
            </div>

            {errorMsg && (
              <div className="bg-red-950/40 border border-red-800 text-red-300 px-3 py-2 rounded-xl text-xs flex items-center gap-2">
                <Icon name="alertCircle" className="w-4 h-4 text-red-400" />
                <span>{errorMsg}</span>
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4 pt-2">
              <div>
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Nueva Contraseña</label>
                <input
                  type="password"
                  value={newPassword}
                  onChange={(e) => setNewPassword(e.target.value)}
                  placeholder="••••••••"

    function StatsTab({ currentUser, stats, matches, predictions, calculatePredictionScore }) {
      const userMatchesHistory = useMemo(() => {
        return matches.map(m => {
          const pred = predictions[`${currentUser.id}_${m.id}`];
          const pts = calculatePredictionScore(pred, m);
          return { match: m, pred, points: pts };
        });
      }, [currentUser, matches, predictions]);

      const accuracy = stats.predictedCount > 0 
        ? Math.round(((stats.exacts + stats.outcomes) / stats.predictedCount) * 100) 
        : 0;

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div className="glass rounded-2xl p-4 text-center">

            <div className="glass rounded-2xl p-4 text-center">

            <div className="glass rounded-2xl p-4 text-center">

            <div className="glass rounded-2xl p-4 text-center">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Fallados (0p)</span>
              <p className="text-3xl font-black text-slate-500 font-mono mt-1 display-font">{stats.missed}</p>

            <div className="glass rounded-2xl p-4 text-center col-span-2 md:col-span-1">

          <div className="glass rounded-2xl p-5 space-y-4">

                  <div className="flex justify-between items-center text-[10px] text-soccer-textMuted">

                        <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[match.home_team_name]}.png`} alt={match.home_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />

    // ----------------------------------------------------

    // ----------------------------------------------------
    function ProfileTab({
      currentUser,
      profile,
      setProfile,
      handleLogout,
      triggerSaveToast
    }) {
      const [name, setName] = useState(profile?.name || "");
      const [avatar, setAvatar] = useState(profile?.avatar || "⚽");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [profileLoading, setProfileLoading] = useState(false);
      const [passLoading, setPassLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [passErrorMsg, setPassErrorMsg] = useState("");

      const avatars = ["⚽", "🏆", "🌟", "👟", "🥅", "🧉", "🌎", "🍀", "💎", "🦁", "🦅", "🔥"];

      useEffect(() => {
        if (profile) {
          setName(profile.name || "");
          setAvatar(profile.avatar || "⚽");
        }
      }, [profile]);

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        setErrorMsg("");
        if (!name.trim()) {
          setErrorMsg("El nombre no puede estar vacío");
          return;
        }
        setProfileLoading(true);
        try {
          const { error } = await supabase
            .from('profiles')
            .update({
              name: name.trim(),
              avatar: avatar,
              updated_at: new Date().toISOString()
            })
            .eq('id', currentUser.id);

          if (error) throw error;

          // Update local profile state
          setProfile({
            ...profile,
            name: name.trim(),
            avatar: avatar
          });

          triggerSaveToast("Perfil guardado con éxito");
        } catch (err) {
          setErrorMsg(err.message);
        } finally {
          setProfileLoading(false);
        }
      };

      const handleUpdatePassword = async (e) => {
        e.preventDefault();
        setPassErrorMsg("");
        
        if (password.length < 6) {
          setPassErrorMsg("La contraseña debe tener al menos 6 caracteres");
          return;
        }
        if (password !== confirmPassword) {
          setPassErrorMsg("Las contraseñas no coinciden");
          return;
        }

        setPassLoading(true);
        try {
          const { error } = await supabase.auth.updateUser({
            password: password
          });

          if (error) throw error;

          setPassword("");
          setConfirmPassword("");
          triggerSaveToast("Contraseña actualizada con éxito");
        } catch (err) {
          setPassErrorMsg(err.message);
        } finally {
          setPassLoading(false);
        }
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          {/* PROFILE INFO CARD */}
          <div className="glass rounded-2xl p-6 border border-soccer-border space-y-4">
            <h3 className="text-sm font-bold display-font text-white flex items-center gap-2 border-b border-soccer-border pb-3">
              <Icon name="user" className="w-4 h-4 text-soccer-primary" />
              Editar Información de Perfil
            </h3>

            {errorMsg && (
              <div className="bg-red-950/40 border border-red-800 text-red-300 px-3 py-2.5 rounded-xl text-xs flex items-center gap-2 mb-4">
                <Icon name="alertCircle" className="w-4 h-4 text-red-400" />
                <span>{errorMsg}</span>
              </div>
            )}

            <form onSubmit={handleSaveProfile} className="space-y-4">
              <div>
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Correo Electrónico (No modificable)</label>
                <input
                  type="text"
                  value={currentUser.email}
                  disabled
                  className="w-full bg-slate-900 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-slate-500 cursor-not-allowed"
                />
              </div>

              <div>
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Nombre para Mostrar</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="Tu Nombre"
                  className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                  required
                />
              </div>

              <div className="space-y-2">
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block">Selecciona tu Avatar/Emoji</label>
                <div className="grid grid-cols-6 gap-2 bg-slate-950/80 p-2.5 rounded-xl border border-soccer-border/60">
                  {avatars.map(av => (
                    <button
                      key={av}
                      type="button"
                      onClick={() => setAvatar(av)}
                      className={`text-xl p-1.5 rounded-lg transition-all ${avatar === av ? 'bg-soccer-primary text-soccer-darker scale-105 border border-soccer-primaryGlow shadow' : 'hover:bg-slate-800'}`}
                    >
                      {av}
                    </button>
                  ))}
                </div>
              </div>

              <button
                type="submit"
                disabled={profileLoading}
                className="w-full bg-soccer-primary hover:bg-emerald-400 disabled:opacity-50 text-soccer-darker text-xs font-black uppercase tracking-wider py-3 rounded-xl transition-all shadow-lg shadow-soccer-primary/10 mt-6 flex justify-center items-center gap-2"
              >
                {profileLoading && <Icon name="soccerBall" className="w-4 h-4 animate-spin text-soccer-darker" />}
                <span>Guardar Perfil</span>
              </button>
            </form>
          </div>

          {/* CHANGE PASSWORD & LOGOUT CARD */}
          <div className="space-y-6">
            <div className="glass rounded-2xl p-6 border border-soccer-border space-y-4">
              <h3 className="text-sm font-bold display-font text-white flex items-center gap-2 border-b border-soccer-border pb-3">
                <Icon name="lock" className="w-4 h-4 text-soccer-accent" />
                Cambiar Contraseña
              </h3>

              {passErrorMsg && (
                <div className="bg-red-950/40 border border-red-800 text-red-300 px-3 py-2.5 rounded-xl text-xs flex items-center gap-2 mb-4">
                  <Icon name="alertCircle" className="w-4 h-4 text-red-400" />
                  <span>{passErrorMsg}</span>
                </div>
              )}

              <form onSubmit={handleUpdatePassword} className="space-y-4">
                <div>
                  <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Nueva Contraseña</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder="Mínimo 6 caracteres"
                    className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                    minLength="6"
                    required
                  />
                </div>

                <div>
                  <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Confirmar Nueva Contraseña</label>
                  <input
                    type="password"
                    value={confirmPassword}
                    onChange={(e) => setConfirmPassword(e.target.value)}
                    placeholder="Mismo valor que arriba"
                    className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                    minLength="6"
                    required
                  />
                </div>

                <button
                  type="submit"
                  disabled={passLoading}
                  className="w-full bg-soccer-accent hover:bg-amber-400 disabled:opacity-50 text-soccer-darker text-xs font-black uppercase tracking-wider py-3 rounded-xl transition-all shadow-lg shadow-soccer-accent/10 mt-6 flex justify-center items-center gap-2"
                >
                  {passLoading && <Icon name="soccerBall" className="w-4 h-4 animate-spin text-soccer-darker" />}
                  <span>Actualizar Contraseña</span>
                </button>
              </form>
            </div>

            <div className="glass rounded-2xl p-6 border border-soccer-border flex flex-col justify-center items-center text-center space-y-3">
              <h3 className="text-xs font-extrabold tracking-wider uppercase text-soccer-textMuted display-font">Sesión Activa</h3>
              <p className="text-xs text-slate-300">¿Deseas cerrar tu sesión en este dispositivo?</p>
              
              <button
                onClick={handleLogout}
                className="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-xs text-red-400 bg-red-950/20 hover:bg-red-950/40 border border-red-900/60 transition-colors font-bold uppercase tracking-wider"
              >
                <Icon name="logOut" className="w-4 h-4 text-red-400" />
                <span>Cerrar Sesión Activa</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function AdminResultsTab({ 
      matches, 
      onUpdateMatch, 
      onSimulateGroupStage, 
      onResetAllScores,
      groupOverrides,
      onUpdateGroupOverrides
    }) {
      const [filterStage, setFilterStage] = useState("pending"); // Default to 'pending' to make updates easier!
      const [searchQuery, setSearchQuery] = useState("");

      const filteredMatches = useMemo(() => {
        let list = matches || [];

        // Stage filters
        if (filterStage === "group") {
          list = list.filter(m => m.stage.includes("Grupo"));
        } else if (filterStage === "knockout") {
          list = list.filter(m => !m.stage.includes("Grupo"));
        } else if (filterStage === "pending") {
          list = list.filter(m => m.home_score === null || m.away_score === null);
        }

        // Search filter
        if (searchQuery.trim() !== "") {
          const query = searchQuery.toLowerCase();
          list = list.filter(m => 
            m.home_team_name.toLowerCase().includes(query) ||
            m.away_team_name.toLowerCase().includes(query) ||
            m.stage.toLowerCase().includes(query)
          );
        }

        return list;
      }, [matches, filterStage, searchQuery]);

      return (
        <div className="glass rounded-2xl p-6 space-y-6">
          <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-4 border-b border-soccer-border pb-4">
            <div>

                Editor de Resultados (Admin)

              <p className="text-xs text-soccer-textMuted mt-1">

            <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto">

                />
                <Icon name="search" className="w-4 h-4 text-soccer-textMuted absolute left-3 top-2.5" />
              </div>
            </div>
          </div>

          {/* FILTERS BAR */}
          <div className="flex flex-wrap bg-slate-950 p-1.5 rounded-xl border border-soccer-border text-xs gap-1.5">
            <button
              onClick={() => setFilterStage("all")}
              className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold transition-all ${filterStage === "all" ? 'bg-slate-800 text-white' : 'text-soccer-textMuted hover:text-white'}`}

            <button
              onClick={() => setFilterStage("group")}

            <button
              onClick={() => setFilterStage("knockout")}
              className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold transition-all ${filterStage === "knockout" ? 'bg-slate-800 text-white' : 'text-soccer-textMuted hover:text-white'}`}
            >
              Eliminatorias
            </button>
            <button
              onClick={() => setFilterStage("pending")}
              className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold transition-all ${filterStage === "pending" ? 'bg-amber-950 text-soccer-accent border border-soccer-accent/30' : 'text-soccer-textMuted hover:text-white'}`}
            >
              Sin Resultado ({matches.filter(m => m.home_score === null || m.away_score === null).length})
            </button>
          </div>

          {/* MATCHES LIST GRID */}
          {filteredMatches.length === 0 ? (
            <div className="text-center py-12 text-soccer-textMuted text-xs border border-dashed border-soccer-border rounded-2xl">
              No se encontraron partidos para los filtros aplicados.
            </div>
