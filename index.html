            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              {filteredMatches.map(match => (
                <AdminMatchCard
                  key={match.id}
                  match={match}
                  onSave={onUpdateMatch}
                />
              ))}
            </div>
          )}

          {/* SECTION: AJUSTAR POSICIONES DE GRUPOS */}
          <div className="border border-soccer-border/80 rounded-2xl p-5 bg-slate-950/40 space-y-4 mt-6">
            <div>
              <h3 className="text-sm font-bold text-white flex items-center gap-2 display-font">
                <Icon name="list" className="w-5 h-5 text-soccer-accent" />
                Ajuste Manual de Posiciones de Grupos (Desempates)
              </h3>
              <p className="text-[11px] text-soccer-textMuted mt-1">
                Utiliza esto para forzar las posiciones finales de un grupo cuando empaten por criterios que no calcula el sistema (como Fair Play o Sorteo). Esto alterará de inmediato la clasificación a la Ronda de 32 y las siguientes fases.
              </p>
            </div>

            <GroupRankEditor 
              matches={matches} 
              groupOverrides={groupOverrides} 
              onSaveOverrides={onUpdateGroupOverrides} 
            />
          </div>

        </div>
      );
    }

    // Individual Admin Match Card Component
    function AdminMatchCard({ match, onSave }) {
      const [hScore, setHScore] = useState(match.home_score !== null ? match.home_score : "");
      const [aScore, setAScore] = useState(match.away_score !== null ? match.away_score : "");
      const [status, setStatus] = useState(match.status);
      const [penaltiesWinner, setPenaltiesWinner] = useState(match.penalties_winner || null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        setHScore(match.home_score !== null ? match.home_score : "");
        setAScore(match.away_score !== null ? match.away_score : "");
        setStatus(match.status);
        setPenaltiesWinner(match.penalties_winner || null);
      }, [match]);

      const isKnockout = !match.stage.includes("Grupo");
      const isDraw = hScore !== "" && hScore !== null && aScore !== "" && aScore !== null && parseInt(hScore) === parseInt(aScore);
      const showPenaltiesSelector = isKnockout && isDraw;
      const isUpdateDisabled = saving || (showPenaltiesSelector && !penaltiesWinner);

      const handleUpdate = async () => {
        setSaving(true);
        // Auto-finalize if scores are provided and status is Scheduled
        let finalStatus = status;
        if (hScore !== "" && hScore !== null && aScore !== "" && aScore !== null && status === "Scheduled") {
          finalStatus = "Finished";
          setStatus("Finished");
        }

        try {
          await onSave(match.id, {
            homeScore: hScore,
            awayScore: aScore,
            status: finalStatus,
            penaltiesWinner: showPenaltiesSelector ? penaltiesWinner : null
          });
        } finally {
          setSaving(false);
        }
      };

      const homeCode = TEAM_COUNTRY_CODES[match.home_team_name];
      const awayCode = TEAM_COUNTRY_CODES[match.away_team_name];

      return (
        <div className="bg-soccer-darker/60 border border-soccer-border rounded-2xl p-4 flex flex-col justify-between gap-3 shadow-md hover:border-slate-700/80 transition-all">
          <div className="flex justify-between items-center text-[10px] text-soccer-textMuted uppercase font-bold">
            <span className="truncate max-w-[170px]">{match.stage}</span>
            <span>{new Date(match.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
          </div>

          {/* Teams and Inputs Row */}
          <div className="flex items-center justify-between gap-1">
            {/* Home Team */}
            <div className="w-[35%] flex flex-col items-center gap-1.5 text-center">
              {homeCode ? (
                <img src={`https://flagcdn.com/32x24/${homeCode}.png`} alt={match.home_team_name} className="w-8 h-6 object-cover rounded shadow-sm select-none" />
              ) : (
                <span className="text-xl select-none">🏳️</span>
              )}
              <span className="text-[11px] font-bold text-slate-200 truncate w-full">{match.home_team_name}</span>
            </div>

            {/* Score Inputs */}
            <div className="w-[30%] flex items-center justify-center gap-1">
              <input
                type="number"
                value={hScore}
                onChange={(e) => {
                  const val = e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value));
                  setHScore(val);
                  if (val !== "" && aScore !== "" && status === "Scheduled") {
                    setStatus("Finished");
                  }
                }}
                placeholder="-"
                className="w-9 h-9 rounded-lg bg-slate-950 border border-soccer-border text-center text-sm font-black text-white focus:outline-none focus:border-soccer-accent transition-colors"
              />
              <span className="text-xs font-bold text-soccer-textMuted">-</span>
              <input
                type="number"
                value={aScore}
                onChange={(e) => {
                  const val = e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value));
                  setAScore(val);
                  if (hScore !== "" && val !== "" && status === "Scheduled") {
                    setStatus("Finished");
                  }
                }}
                placeholder="-"
                className="w-9 h-9 rounded-lg bg-slate-950 border border-soccer-border text-center text-sm font-black text-white focus:outline-none focus:border-soccer-accent transition-colors"
              />
            </div>

            {/* Away Team */}
            <div className="w-[35%] flex flex-col items-center gap-1.5 text-center">
              {awayCode ? (
                <img src={`https://flagcdn.com/32x24/${awayCode}.png`} alt={match.away_team_name} className="w-8 h-6 object-cover rounded shadow-sm select-none" />
              ) : (
                <span className="text-xl select-none">🏳️</span>
              )}
              <span className="text-[11px] font-bold text-slate-200 truncate w-full">{match.away_team_name}</span>
            </div>
          </div>

          {/* Penalties Selection Box */}
          {showPenaltiesSelector && (
            <div className="bg-slate-950/80 border border-soccer-border rounded-xl p-2.5 flex flex-col gap-2 mt-1">
              <span className="text-[10px] font-bold text-soccer-accent flex items-center gap-1">
                <span>🏆 Definición por Penales (¿Quién avanza?)</span>
              </span>
              <div className="grid grid-cols-2 gap-2">
                <button
                  type="button"
                  onClick={() => setPenaltiesWinner("home")}
                  className={`py-1.5 px-2 rounded-lg text-[10px] font-bold transition-all border truncate ${
                    penaltiesWinner === "home"
                      ? "bg-soccer-primary text-soccer-darker border-soccer-primary shadow-lg shadow-soccer-primary/10"
                      : "bg-slate-900 text-slate-300 border-soccer-border hover:border-slate-700"
                  }`}
                >
                  {match.home_team_name}
                </button>
                <button
                  type="button"
                  onClick={() => setPenaltiesWinner("away")}
                  className={`py-1.5 px-2 rounded-lg text-[10px] font-bold transition-all border truncate ${
                    penaltiesWinner === "away"
                      ? "bg-soccer-primary text-soccer-darker border-soccer-primary shadow-lg shadow-soccer-primary/10"
                      : "bg-slate-900 text-slate-300 border-soccer-border hover:border-slate-700"
                  }`}
                >
                  {match.away_team_name}
                </button>
              </div>
              {!penaltiesWinner && (
                <span className="text-[9px] font-bold text-rose-400 mt-0.5 text-center">
                  ⚠️ Debe seleccionar el ganador de penales para guardar.
                </span>
              )}
            </div>
          )}

          {/* Action Row */}
          <div className="flex items-center justify-between gap-2 border-t border-slate-900 pt-2.5 mt-1">
            <select
              value={status}
              onChange={(e) => setStatus(e.target.value)}
              className="bg-slate-950 border border-soccer-border rounded-lg text-[10px] py-1 px-1.5 text-slate-200 focus:outline-none font-bold"
            >
              <option value="Scheduled">Programado</option>
              <option value="Live">En Vivo</option>
              <option value="Finished">Finalizado</option>
            </select>

            <button
              onClick={handleUpdate}
              disabled={isUpdateDisabled}
              className="bg-soccer-accent hover:bg-amber-400 disabled:opacity-50 disabled:hover:bg-soccer-accent text-soccer-darker font-black text-[10px] py-1 px-3 rounded-lg transition-all flex items-center gap-1"
            >
              {saving ? (
                <>
                  <Icon name="soccerBall" className="w-3 h-3 animate-spin" />
                  <span>Guardando...</span>
                </>
              ) : (
                <>
                  <Icon name="check" className="w-3 h-3" />
                  <span>Actualizar</span>
                </>
              )}
            </button>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // COMPONENT: ADMIN GROUP POSITION OVERRIDES EDITOR
    // ----------------------------------------------------
    function GroupRankEditor({ matches, groupOverrides, onSaveOverrides }) {
      const [selectedLetter, setSelectedLetter] = useState("A");
      const groupLetters = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];

      // Find the teams in the selected group dynamically from TEAM_GROUPS
      const groupTeams = useMemo(() => {
        return Object.entries(TEAM_GROUPS)
          .filter(([team, letter]) => letter === selectedLetter)
          .map(([team]) => team);
      }, [selectedLetter]);

      // Calculate stats for these teams using matches, just to show their current points
      const teamStats = useMemo(() => {
        const stats = {};
        groupTeams.forEach(t => {
          stats[t] = { points: 0, goalDiff: 0, goalsFor: 0 };
        });

        matches.forEach(m => {
          if (m.stage.includes(`Grupo ${selectedLetter}`) && m.status === "Finished" && m.home_score !== null && m.away_score !== null) {
            const hGoals = parseInt(m.home_score);
            const aGoals = parseInt(m.away_score);
            const hTeam = m.home_team_name;
            const aTeam = m.away_team_name;

            if (stats[hTeam] && stats[aTeam]) {
              stats[hTeam].goalsFor += hGoals;
              stats[hTeam].goalDiff += (hGoals - aGoals);
              stats[aTeam].goalsFor += aGoals;
              stats[aTeam].goalDiff += (aGoals - hGoals);

              if (hGoals > aGoals) {
                stats[hTeam].points += 3;
              } else if (hGoals < aGoals) {
                stats[aTeam].points += 3;
              } else {
                stats[hTeam].points += 1;
                stats[aTeam].points += 1;
              }
            }
          }
        });

        return stats;
      }, [groupTeams, matches, selectedLetter]);

      // State to track the local order of teams in the selector
      const [localOrder, setLocalOrder] = useState([]);

      // Initialize local order when selected letter or groupOverrides changes
      useEffect(() => {
        // De-duplicate overrides by team_name to be bulletproof
        const uniqueOverridesMap = {};
        groupOverrides
          .filter(o => o.group_letter === selectedLetter)
          .forEach(o => {
            uniqueOverridesMap[o.team_name] = o;
          });
        
        const overrides = Object.values(uniqueOverridesMap);

        if (overrides.length === 4) {
          const sorted = [...overrides].sort((a, b) => a.manual_rank - b.manual_rank);
          setLocalOrder(sorted.map(s => s.team_name));
        } else {
          const defaultSorted = [...groupTeams].sort((a, b) => {
            const statA = teamStats[a] || { points: 0, goalDiff: 0, goalsFor: 0 };
            const statB = teamStats[b] || { points: 0, goalDiff: 0, goalsFor: 0 };
            if (statB.points !== statA.points) return statB.points - statA.points;
            if (statB.goalDiff !== statA.goalDiff) return statB.goalDiff - statA.goalDiff;
            if (statB.goalsFor !== statA.goalsFor) return statB.goalsFor - statA.goalsFor;
            return a.localeCompare(b);
          });
          setLocalOrder(defaultSorted);
        }
      }, [selectedLetter, groupOverrides, groupTeams, teamStats]);

      const moveTeam = (index, direction) => {
        const nextOrder = [...localOrder];
        const targetIndex = index + direction;
        if (targetIndex >= 0 && targetIndex < localOrder.length) {
          const temp = nextOrder[index];
          nextOrder[index] = nextOrder[targetIndex];
          nextOrder[targetIndex] = temp;
          setLocalOrder(nextOrder);
        }
      };

      const hasOverride = groupOverrides.some(o => o.group_letter === selectedLetter);

      return (
        <div className="flex flex-col sm:flex-row gap-6 items-start bg-slate-900/60 p-4 rounded-xl border border-soccer-border/60">
          <div className="w-full sm:w-1/4 space-y-3">
            <label className="text-[10px] uppercase font-bold text-soccer-textMuted block">Seleccionar Grupo</label>
            <select
              value={selectedLetter}
              onChange={(e) => setSelectedLetter(e.target.value)}
              className="w-full bg-slate-950 border border-soccer-border px-3 py-2 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-accent"
            >
              {groupLetters.map(l => (
                <option key={l} value={l}>Grupo {l}</option>
              ))}
            </select>
            
            <div className="pt-1">
              <span className={`text-[10px] font-black uppercase rounded px-2.5 py-1 border ${
                hasOverride 
                  ? 'bg-amber-950/40 text-soccer-accent border-amber-800/60' 
                  : 'bg-emerald-950/40 text-soccer-primary border-emerald-800/60'
              }`}>
                Estado: {hasOverride ? "Manual/Ajustado" : "Cálculo Auto"}
              </span>
            </div>
          </div>

          <div className="flex-1 w-full space-y-3">
            <div className="text-[10px] uppercase font-bold text-soccer-textMuted">Orden de Clasificación (Arriba 1°, Abajo 4°)</div>
            <div className="space-y-2">
              {localOrder.map((team, idx) => {
                const stats = teamStats[team] || { points: 0, goalDiff: 0, goalsFor: 0 };
                const code = TEAM_COUNTRY_CODES[team];
                return (
                  <div key={team} className="flex items-center justify-between bg-slate-950 border border-soccer-border/80 px-4 py-2.5 rounded-xl text-xs">
                    <div className="flex items-center gap-2.5">
                      <span className="w-5 h-5 rounded-full bg-slate-900 border border-soccer-border flex items-center justify-center font-mono font-bold text-[10px] text-soccer-textMuted">
                        {idx + 1}
                      </span>
                      {code ? (
                        <img src={`https://flagcdn.com/16x12/${code}.png`} alt={team} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                      ) : (
                        <span className="text-sm select-none">🏳️</span>
                      )}
                      <span className="font-bold text-slate-200">{team}</span>
                      <span className="text-[10px] text-soccer-textMuted font-mono">
                        ({stats.points} pts, {stats.goalDiff > 0 ? `+${stats.goalDiff}` : stats.goalDiff} DG, {stats.goalsFor} GF)
                      </span>
                    </div>
                    
                    <div className="flex items-center gap-1.5">
                      <button
                        type="button"
                        onClick={() => moveTeam(idx, -1)}
                        disabled={idx === 0}
                        className="bg-slate-900 hover:bg-slate-800 border border-soccer-border p-1.5 rounded-lg text-slate-350 disabled:opacity-40 disabled:hover:bg-slate-900 transition-colors"
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 15l7-7 7 7" />
                        </svg>
                      </button>
                      <button
                        type="button"
                        onClick={() => moveTeam(idx, 1)}
                        disabled={idx === localOrder.length - 1}
                        className="bg-slate-900 hover:bg-slate-800 border border-soccer-border p-1.5 rounded-lg text-slate-350 disabled:opacity-40 disabled:hover:bg-slate-900 transition-colors"
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7" />
                        </svg>
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="flex gap-2 pt-2 justify-end">
              {hasOverride && (
                <button
                  type="button"
                  onClick={() => onSaveOverrides(selectedLetter, null)}
                  className="bg-slate-950 border border-red-500/30 hover:bg-red-950/20 hover:border-red-500 text-red-400 text-xs font-bold py-2.5 px-4 rounded-xl transition-all"
                >
                  Restaurar Cálculo Auto
                </button>
              )}
              <button
                type="button"
                onClick={() => onSaveOverrides(selectedLetter, localOrder)}
                className="bg-soccer-accent hover:bg-amber-400 text-soccer-darker text-xs font-black py-2.5 px-4 rounded-xl transition-all shadow-md shadow-soccer-accent/10"
              >
                Guardar Posiciones
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // COMPONENT: ADMIN CONTROL SIDEBAR
    // ----------------------------------------------------
    function AdminPanel({
      isOpen,
      onClose,
      systemTime,
      matches,
      onUpdateMatch,
      onSetTime,
      onResetTime,
      triggerSaveToast,
      setMatches
    }) {
      const [customDate, setCustomDate] = useState("");
      const [customTime, setCustomTime] = useState("");
      
      // API Football states
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("api_football_key") || "");
      const [syncLoading, setSyncLoading] = useState(false);

      useEffect(() => {
        const d = new Date(systemTime);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        
        setCustomDate(`${yyyy}-${mm}-${dd}`);
        setCustomTime(`${hh}:${min}`);
      }, [systemTime]);

      const handleSetCustomTime = (e) => {
        e.preventDefault();
        if (customDate && customTime) {
          onSetTime(`${customDate}T${customTime}:00`);
        }
      };

      const handleShiftTime = (mins) => {
        const current = new Date(systemTime);
        current.setMinutes(current.getMinutes() + mins);
        
        const yyyy = current.getFullYear();
        const mm = String(current.getMonth() + 1).padStart(2, '0');
        const dd = String(current.getDate()).padStart(2, '0');
        const hh = String(current.getHours()).padStart(2, '0');
        const min = String(current.getMinutes()).padStart(2, '0');
        
        onSetTime(`${yyyy}-${mm}-${dd}T${hh}:${min}:00`);
      };

      // REAL TIME API-FOOTBALL SCORE SYNC
      const handleSyncScores = async () => {
        if (!apiKey.trim()) {
          triggerSaveToast("Ingresa tu API Key de API-football");
          return;
        }
        
        setSyncLoading(true);
        localStorage.setItem("api_football_key", apiKey.trim());

        try {
          // 1. Fetch fixtures from API-football
          // League ID 1 represents the FIFA World Cup
          const response = await fetch('https://v3.football.api-sports.io/fixtures?league=1&season=2026', {
            headers: {
              'x-apisports-key': apiKey.trim(),
              'x-rapidapi-host': 'v3.football.api-sports.io'
            }
          });

          const resData = await response.json();
          
          if (resData.errors && Object.keys(resData.errors).length > 0) {
            throw new Error(JSON.stringify(resData.errors));
          }
          
          const fixtures = resData.response;
          if (!fixtures || fixtures.length === 0) {
            throw new Error("No se encontraron partidos para la temporada 2026.");
          }

          // 2. Loop through local matches and update from api response
          let updateCount = 0;
          for (const dbMatch of matches) {
            const homeEnglish = TEAM_NAME_MAP[dbMatch.home_team_name];
            const awayEnglish = TEAM_NAME_MAP[dbMatch.away_team_name];

            const fixture = fixtures.find(f => 
              (f.teams.home.name === homeEnglish && f.teams.away.name === awayEnglish) ||
              (f.teams.home.name === homeEnglish && f.fixture.id === dbMatch.api_fixture_id)
            );

            if (fixture) {
              let apiStatus = fixture.fixture.status.short;
              let dbStatus = "Scheduled";
              
              if (["FT", "AET", "PEN"].includes(apiStatus)) {
                dbStatus = "Finished";
              } else if (["1H", "2H", "HT", "ET", "P", "LIVE"].includes(apiStatus)) {
                dbStatus = "Live";
              }

              const apiHomeScore = fixture.goals.home;
              const apiAwayScore = fixture.goals.away;

              // If scores or status changed, perform update in Supabase
              if (dbMatch.home_score !== apiHomeScore || dbMatch.away_score !== apiAwayScore || dbMatch.status !== dbStatus || !dbMatch.api_fixture_id) {
                const { error: updateErr } = await supabase
                  .from('matches')
                  .update({
                    home_score: apiHomeScore,
                    away_score: apiAwayScore,
                    status: dbStatus,
                    api_fixture_id: fixture.fixture.id
                  })
                  .eq('id', dbMatch.id);

                if (updateErr) console.error("Error updating match in Supabase:", updateErr);
                else updateCount++;
              }
            }
          }

          // 3. Reload matches
          const { data: refreshedMatches } = await supabase.from('matches').select('*').order('date');
          setMatches(refreshedMatches || []);
          triggerSaveToast(`Sincronización finalizada. ${updateCount} partidos actualizados.`);
        } catch (err) {
          console.error("Sync error:", err);
          triggerSaveToast(`Error de sync: ${err.message}`);
        } finally {
          setSyncLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex justify-end">
          <div onClick={onClose} className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
          
          <div className="relative w-full max-w-md bg-soccer-dark border-l border-soccer-border h-full flex flex-col overflow-y-auto shadow-2xl p-6 z-10 animate-slide-in">
            <div className="flex justify-between items-center border-b border-soccer-border pb-4 mb-6">
              <h2 className="text-md font-bold display-font text-white flex items-center gap-2">
                <Icon name="settings" className="w-5 h-5 text-soccer-accent animate-spin-slow" />
                Panel de Administración Real
              </h2>
              <button
                onClick={onClose}
                className="text-soccer-textMuted hover:text-white text-xs font-semibold px-2 py-1 bg-slate-900 border border-soccer-border rounded-lg"
              >
                Cerrar
              </button>
            </div>

            {/* SYNC CON API-FOOTBALL */}
            <div className="space-y-4 border-b border-soccer-border/80 pb-6 mb-6">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-primary display-font flex items-center gap-1.5">
                <Icon name="sync" className="w-4 h-4 text-soccer-primary" />
                Sincronización API-football
              </h3>
              <p className="text-[11px] text-soccer-textMuted">Conecta tu API-key para actualizar automáticamente los resultados reales desde la API de api-football.com.</p>
              
              <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-2.5 text-[10px] text-amber-300 leading-normal">
                <strong>⚠️ Limitación del Plan Gratis:</strong> Los planes gratuitos de API-football no permiten consultar la temporada 2026 (solo 2022-2024). Si tienes un plan gratuito, debes usar el <strong>Editor Manual de Partidos</strong> que está justo abajo para actualizar los marcadores reales.
              </div>

              <div className="space-y-2">
                <input
                  type="password"
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                  placeholder="x-apisports-key"
                  className="w-full bg-slate-950 border border-soccer-border px-3 py-2 rounded-xl text-xs text-white focus:outline-none"
                />
                <button
                  onClick={handleSyncScores}
                  disabled={syncLoading}
                  className="w-full bg-soccer-primary hover:bg-emerald-400 disabled:opacity-50 text-soccer-darker text-xs font-bold py-2 rounded-xl transition-colors flex justify-center items-center gap-1.5"
                >
                  {syncLoading ? (
                    <>
                      <Icon name="soccerBall" className="w-4 h-4 animate-spin" />
                      <span>Sincronizando...</span>
                    </>
                  ) : (
                    <span>Sincronizar Resultados Reales</span>
                  )}
                </button>
              </div>
            </div>

            {/* TIME TRAVEL (UI SIMULATION) */}
            <div className="space-y-4 border-b border-soccer-border/80 pb-6 mb-6">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-accent display-font">Máquina del Tiempo (Test UI)</h3>
              <p className="text-[11px] text-soccer-textMuted">Viaja en el tiempo para simular la vista del calendario y comprobar bloqueos locales.</p>

              <div className="bg-slate-950 border border-soccer-border rounded-xl p-3 text-center">
                <span className="text-[10px] text-soccer-textMuted font-bold uppercase block mb-1">Hora Activa en tu Navegador</span>
                <span className="font-mono text-sm font-black text-white">{new Date(systemTime).toLocaleString('es-ES')}</span>
              </div>

              <div className="grid grid-cols-3 gap-2">
                <button onClick={() => handleShiftTime(10)} className="bg-slate-900 hover:bg-slate-800 border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">+10m</button>
                <button onClick={() => handleShiftTime(60)} className="bg-slate-900 hover:bg-slate-800 border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">+1h</button>
                <button onClick={onResetTime} className="bg-slate-900 hover:bg-soccer-accent hover:text-soccer-darker border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">Tiempo Real</button>
              </div>

              <form onSubmit={handleSetCustomTime} className="space-y-3">
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <input
                      type="date"
                      value={customDate}
                      onChange={(e) => setCustomDate(e.target.value)}
                      className="w-full bg-slate-950 border border-soccer-border p-2 rounded-lg text-xs text-white focus:outline-none"
                    />
                  </div>
                  <div>
                    <input
                      type="time"
                      value={customTime}
                      onChange={(e) => setCustomTime(e.target.value)}
                      className="w-full bg-slate-950 border border-soccer-border p-2 rounded-lg text-xs text-white focus:outline-none"
                    />
                  </div>
                </div>
                <button type="submit" className="w-full bg-soccer-accent hover:bg-amber-400 text-soccer-darker text-xs font-bold py-2 rounded-xl transition-colors">
                  Viajar
                </button>
              </form>
            </div>

          </div>
        </div>
      );
    }

    // Render application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
