                                <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[m.home_team_name]}.png`} alt={m.home_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                              ) : (
                                <span className="text-sm select-none">🏳️</span>
                              )}
                              <span>{m.home_team_name}</span>
                              <span className="text-[10px] text-soccer-textMuted mx-0.5">vs</span>
                              {TEAM_COUNTRY_CODES[m.away_team_name] ? (
                                <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[m.away_team_name]}.png`} alt={m.away_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                              ) : (
                                <span className="text-sm select-none">🏳️</span>
                              )}
                              <span>{m.away_team_name}</span>
                            </div>
                          </div>
                          
                          <div className="text-right flex flex-col items-end gap-1">
                            {pred ? (
                              <span className="font-mono bg-slate-900 border border-slate-800 text-white px-2 py-0.5 rounded font-black text-xs">
                                {pred.homeScore} - {pred.awayScore}
                              </span>
                            ) : (
                              <span className="text-slate-650 italic text-[10px]">Oculto / Sin pred</span>
                            )}
                            
                            {m.status === "Finished" && (
                              <span className={`text-[9px] font-bold uppercase rounded px-1.5 ${
                                pts === 5 
                                  ? 'bg-amber-950 text-amber-400 border border-amber-800' 
                                  : pts === 3 
                                    ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' 
                                    : 'bg-slate-800 text-slate-500'
                              }`}>
                                +{pts} pts
                              </span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // SUB-COMPONENTS: MY STATS TAB
    // ----------------------------------------------------
    function StatsTab({ currentUser, stats, matches, predictions, calculatePredictionScore }) {
      const userMatchesHistory = useMemo(() => {
        return matches.map(m => {
          const pred = predictions[`${currentUser.id}_${m.id}`];
          const pts = calculatePredictionScore(pred, m);
          return { match: m, pred, points: pts };
        });
      }, [currentUser, matches, predictions]);

      const accuracy = stats.predictedCount > 0 
        ? Math.round(((stats.exacts + stats.outcomes) / stats.predictedCount) * 100) 
        : 0;

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div className="glass rounded-2xl p-4 text-center">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Puntos Totales</span>
              <p className="text-3xl font-black text-white font-mono mt-1 display-font">{stats.points}</p>
            </div>
            <div className="glass rounded-2xl p-4 text-center">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Marcador Exacto (5p)</span>
              <p className="text-3xl font-black text-soccer-accent font-mono mt-1 display-font">{stats.exacts}</p>
            </div>
            <div className="glass rounded-2xl p-4 text-center">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Resultado Solo (3p)</span>
              <p className="text-3xl font-black text-emerald-400 font-mono mt-1 display-font">{stats.outcomes}</p>
            </div>
            <div className="glass rounded-2xl p-4 text-center">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Fallados (0p)</span>
              <p className="text-3xl font-black text-slate-500 font-mono mt-1 display-font">{stats.missed}</p>
            </div>
            <div className="glass rounded-2xl p-4 text-center col-span-2 md:col-span-1">
              <span className="text-soccer-textMuted text-[10px] uppercase font-bold tracking-wider">Efectividad</span>
              <p className="text-3xl font-black text-sky-400 font-mono mt-1 display-font">{accuracy}%</p>
            </div>
          </div>

          <div className="glass rounded-2xl p-5 space-y-4">
            <h3 className="text-sm font-bold display-font text-white">Historial de Predicciones y Puntos Obtenidos</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {userMatchesHistory.map(({ match, pred, points }) => (
                <div key={match.id} className="bg-soccer-darker/60 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between gap-3">
                  <div className="flex justify-between items-center text-[10px] text-soccer-textMuted">
                    <span>{match.stage}</span>
                    <span>{new Date(match.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })}</span>
                  </div>

                  <div className="flex justify-between items-center">
                    <div className="flex items-center gap-1.5 font-bold text-sm text-slate-200">
                      {TEAM_COUNTRY_CODES[match.home_team_name] ? (
                        <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[match.home_team_name]}.png`} alt={match.home_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                      ) : (
                        <span className="text-sm select-none">🏳️</span>
                      )}
                      <span>{match.home_team_name}</span>
                      <span className="text-xs text-soccer-textMuted font-medium mx-0.5">vs</span>
                      {TEAM_COUNTRY_CODES[match.away_team_name] ? (
                        <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[match.away_team_name]}.png`} alt={match.away_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
                      ) : (
                        <span className="text-sm select-none">🏳️</span>
                      )}
                      <span>{match.away_team_name}</span>
                    </div>

                    {(match.status === "Finished" || match.status === "Live") && (
                      <span className="font-mono bg-slate-900 border border-slate-800 text-soccer-accent px-2 py-0.5 rounded font-black text-xs">
                        {match.home_score} - {match.away_score}
                      </span>
                    )}
                  </div>

                  <div className="border-t border-slate-800/80 pt-2 flex justify-between items-center text-xs">
                    <div>
                      <span className="text-soccer-textMuted">Tu Pronóstico: </span>
                      {pred ? (
                        <span className="font-bold font-mono text-white bg-slate-900/80 px-2 py-0.5 rounded border border-slate-800">
                          {pred.homeScore} - {pred.awayScore}
                        </span>
                      ) : (
                        <span className="italic text-slate-650 text-[10px]">No ingresado</span>
                      )}
                    </div>

                    <div>
                      {match.status === "Finished" && (
                        <span className={`px-2 py-1 rounded-lg text-[10px] font-black uppercase border ${
                          points === 5 
                            ? 'bg-amber-950 text-amber-400 border-amber-800' 
                            : points === 3 
                              ? 'bg-emerald-950 text-emerald-400 border-emerald-800' 
                              : 'bg-slate-900 text-slate-500 border-slate-800'
                        }`}>
                          +{points} pts
                        </span>
                      )}
                      {match.status === "Live" && (
                        <span className="bg-red-950 text-red-400 border border-red-950 text-[10px] px-2 py-0.5 rounded-lg font-bold uppercase animate-pulse">
                          En Vivo
                        </span>
                      )}
                      {match.status === "Scheduled" && (
                        <span className="bg-emerald-950 text-emerald-400 border border-emerald-900 text-[10px] px-2 py-0.5 rounded-lg font-bold uppercase">
                          Abierto
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // SUB-COMPONENTS: PROFILE TAB
    // ----------------------------------------------------
    function ProfileTab({
      currentUser,
      profile,
      setProfile,
      handleLogout,
      triggerSaveToast
    }) {
      const [name, setName] = useState(profile?.name || "");
      const [avatar, setAvatar] = useState(profile?.avatar || "⚽");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [profileLoading, setProfileLoading] = useState(false);
      const [passLoading, setPassLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [passErrorMsg, setPassErrorMsg] = useState("");

      const avatars = ["⚽", "🏆", "🌟", "👟", "🥅", "🧉", "🌎", "🍀", "💎", "🦁", "🦅", "🔥"];

      useEffect(() => {
        if (profile) {
          setName(profile.name || "");
          setAvatar(profile.avatar || "⚽");
        }
      }, [profile]);

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        setErrorMsg("");
        if (!name.trim()) {
          setErrorMsg("El nombre no puede estar vacío");
          return;
        }
        setProfileLoading(true);
        try {
          const { error } = await supabase
            .from('profiles')
            .update({
              name: name.trim(),
              avatar: avatar,
              updated_at: new Date().toISOString()
            })
            .eq('id', currentUser.id);

          if (error) throw error;

          // Update local profile state
          setProfile({
            ...profile,
            name: name.trim(),
            avatar: avatar
          });

          triggerSaveToast("Perfil guardado con éxito");
        } catch (err) {
          setErrorMsg(err.message);
        } finally {
          setProfileLoading(false);
        }
      };

      const handleUpdatePassword = async (e) => {
        e.preventDefault();
        setPassErrorMsg("");
        
        if (password.length < 6) {
          setPassErrorMsg("La contraseña debe tener al menos 6 caracteres");
          return;
        }
        if (password !== confirmPassword) {
          setPassErrorMsg("Las contraseñas no coinciden");
          return;
        }

        setPassLoading(true);
        try {
          const { error } = await supabase.auth.updateUser({
            password: password
          });

          if (error) throw error;

          setPassword("");
          setConfirmPassword("");
          triggerSaveToast("Contraseña actualizada con éxito");
        } catch (err) {
          setPassErrorMsg(err.message);
        } finally {
          setPassLoading(false);
        }
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          {/* PROFILE INFO CARD */}
          <div className="glass rounded-2xl p-6 border border-soccer-border space-y-4">
            <h3 className="text-sm font-bold display-font text-white flex items-center gap-2 border-b border-soccer-border pb-3">
              <Icon name="user" className="w-4 h-4 text-soccer-primary" />
              Editar Información de Perfil
            </h3>

            {errorMsg && (
              <div className="bg-red-950/40 border border-red-800 text-red-300 px-3 py-2.5 rounded-xl text-xs flex items-center gap-2 mb-4">
                <Icon name="alertCircle" className="w-4 h-4 text-red-400" />
                <span>{errorMsg}</span>
              </div>
            )}

            <form onSubmit={handleSaveProfile} className="space-y-4">
              <div>
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Correo Electrónico (No modificable)</label>
                <input
                  type="text"
                  value={currentUser.email}
                  disabled
                  className="w-full bg-slate-900 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-slate-500 cursor-not-allowed"
                />
              </div>

              <div>
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Nombre para Mostrar</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="Tu Nombre"
                  className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                  required
                />
              </div>

              <div className="space-y-2">
                <label className="text-[10px] uppercase font-bold text-soccer-textMuted block">Selecciona tu Avatar/Emoji</label>
                <div className="grid grid-cols-6 gap-2 bg-slate-950/80 p-2.5 rounded-xl border border-soccer-border/60">
                  {avatars.map(av => (
                    <button
                      key={av}
                      type="button"
                      onClick={() => setAvatar(av)}
                      className={`text-xl p-1.5 rounded-lg transition-all ${avatar === av ? 'bg-soccer-primary text-soccer-darker scale-105 border border-soccer-primaryGlow shadow' : 'hover:bg-slate-800'}`}
                    >
                      {av}
                    </button>
                  ))}
                </div>
              </div>

              <button
                type="submit"
                disabled={profileLoading}
                className="w-full bg-soccer-primary hover:bg-emerald-400 disabled:opacity-50 text-soccer-darker text-xs font-black uppercase tracking-wider py-3 rounded-xl transition-all shadow-lg shadow-soccer-primary/10 mt-6 flex justify-center items-center gap-2"
              >
                {profileLoading && <Icon name="soccerBall" className="w-4 h-4 animate-spin text-soccer-darker" />}
                <span>Guardar Perfil</span>
              </button>
            </form>
          </div>

          {/* CHANGE PASSWORD & LOGOUT CARD */}
          <div className="space-y-6">
            <div className="glass rounded-2xl p-6 border border-soccer-border space-y-4">
              <h3 className="text-sm font-bold display-font text-white flex items-center gap-2 border-b border-soccer-border pb-3">
                <Icon name="lock" className="w-4 h-4 text-soccer-accent" />
                Cambiar Contraseña
              </h3>

              {passErrorMsg && (
                <div className="bg-red-950/40 border border-red-800 text-red-300 px-3 py-2.5 rounded-xl text-xs flex items-center gap-2 mb-4">
                  <Icon name="alertCircle" className="w-4 h-4 text-red-400" />
                  <span>{passErrorMsg}</span>
                </div>
              )}

              <form onSubmit={handleUpdatePassword} className="space-y-4">
                <div>
                  <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Nueva Contraseña</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder="Mínimo 6 caracteres"
                    className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                    minLength="6"
                    required
                  />
                </div>

                <div>
                  <label className="text-[10px] uppercase font-bold text-soccer-textMuted block mb-1">Confirmar Nueva Contraseña</label>
                  <input
                    type="password"
                    value={confirmPassword}
                    onChange={(e) => setConfirmPassword(e.target.value)}
                    placeholder="Mismo valor que arriba"
                    className="w-full bg-slate-950 border border-soccer-border px-3.5 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:border-soccer-primary focus:ring-1 focus:ring-soccer-primary transition-all"
                    minLength="6"
                    required
                  />
                </div>

                <button
                  type="submit"
                  disabled={passLoading}
                  className="w-full bg-soccer-accent hover:bg-amber-400 disabled:opacity-50 text-soccer-darker text-xs font-black uppercase tracking-wider py-3 rounded-xl transition-all shadow-lg shadow-soccer-accent/10 mt-6 flex justify-center items-center gap-2"
                >
                  {passLoading && <Icon name="soccerBall" className="w-4 h-4 animate-spin text-soccer-darker" />}
                  <span>Actualizar Contraseña</span>
                </button>
              </form>
            </div>

            <div className="glass rounded-2xl p-6 border border-soccer-border flex flex-col justify-center items-center text-center space-y-3">
              <h3 className="text-xs font-extrabold tracking-wider uppercase text-soccer-textMuted display-font">Sesión Activa</h3>
              <p className="text-xs text-slate-300">¿Deseas cerrar tu sesión en este dispositivo?</p>
              
              <button
                onClick={handleLogout}
                className="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-xs text-red-400 bg-red-950/20 hover:bg-red-950/40 border border-red-900/60 transition-colors font-bold uppercase tracking-wider"
              >
                <Icon name="logOut" className="w-4 h-4 text-red-400" />
                <span>Cerrar Sesión Activa</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // SUB-COMPONENTS: RULES TAB
    // ----------------------------------------------------
    function RulesTab() {
      return (
        <div className="glass rounded-2xl p-6 space-y-6">
          <h2 className="text-lg font-bold display-font text-white border-b border-soccer-border pb-3">Reglamento y Puntuación</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <h3 className="font-bold text-soccer-primary text-sm uppercase tracking-wide flex items-center gap-1.5">
                <span className="h-2 w-2 bg-soccer-primary rounded-full"></span>
                Reglas de Puntuación
              </h3>
              <p className="text-xs text-soccer-textMuted leading-relaxed">
                El sistema evalúa tus predicciones y otorga puntos de manera automática una vez finalizados los encuentros:
              </p>
              
              <ul className="space-y-3.5 mt-2">
                <li className="flex items-start gap-3 bg-amber-950/20 border border-amber-900/30 p-3 rounded-xl">
                  <span className="text-2xl">⭐</span>
                  <div>
                    <h4 className="font-bold text-amber-400 text-xs">Marcador Exacto (5 Puntos)</h4>
                    <p className="text-[11px] text-slate-300 mt-0.5">Le atinas al ganador/empate y a la cantidad exacta de goles de ambos equipos. (Ej: Predicción: 2-1 | Resultado: 2-1).</p>
                  </div>
                </li>
                <li className="flex items-start gap-3 bg-emerald-950/20 border border-emerald-900/30 p-3 rounded-xl">
                  <span className="text-2xl">✓</span>
                  <div>
                    <h4 className="font-bold text-emerald-400 text-xs">Resultado Acertado Solo (3 Puntos)</h4>
                    <p className="text-[11px] text-slate-300 mt-0.5">Le atinas al ganador o al empate, pero fallas en los marcadores de goles específicos. (Ej: Predicción: 1-0 | Resultado: 3-1).</p>
                  </div>
                </li>
                <li className="flex items-start gap-3 bg-slate-900/40 border border-slate-800 p-3 rounded-xl">
                  <span className="text-2xl">✗</span>
                  <div>
                    <h4 className="font-bold text-slate-400 text-xs">Sin Aciertos (0 Puntos)</h4>
                    <p className="text-[11px] text-slate-500 mt-0.5">Fallas tanto en el ganador/empate como en los goles marcados.</p>
                  </div>
                </li>
              </ul>
            </div>

            <div className="space-y-6">
              <div className="space-y-3">
                <h3 className="font-bold text-soccer-accent text-sm uppercase tracking-wide flex items-center gap-1.5">
                  <span className="h-2 w-2 bg-soccer-accent rounded-full"></span>
                  Cierre de Pronósticos (10 Minutos)
                </h3>
                <p className="text-xs text-soccer-textMuted leading-relaxed">
                  Puedes guardar y modificar tus predicciones hasta exactamente **10 minutos antes** de la hora oficial programada para el kick-off de cada partido. El sistema bloquea automáticamente los inputs después de este límite (regulado de manera segura por la base de datos).
                </p>
              </div>
              <div className="space-y-3">
                <h3 className="font-bold text-white text-sm uppercase tracking-wide flex items-center gap-1.5">
                  <Icon name="trendingUp" className="w-4 h-4 text-soccer-primary" />
                  Criterio de Desempate
                </h3>
                <p className="text-xs text-soccer-textMuted leading-relaxed">
                  Si dos o más competidores tienen los mismos puntos totales, la tabla de clasificaciones dinámica resolverá el desempate priorizando al usuario con **mayor número de Marcadores Exactos** (pronósticos de 5 puntos).
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // COMPONENT: ADMIN CONTROL SIDEBAR
    // ----------------------------------------------------
    function AdminPanel({
      isOpen,
      onClose,
      systemTime,
      matches,
      onUpdateMatch,
      onSetTime,
      onResetTime,
      triggerSaveToast,
      setMatches
    }) {
      const [customDate, setCustomDate] = useState("");
      const [customTime, setCustomTime] = useState("");
      
      // API Football states
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("api_football_key") || "");
      const [syncLoading, setSyncLoading] = useState(false);

      useEffect(() => {
        const d = new Date(systemTime);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        
        setCustomDate(`${yyyy}-${mm}-${dd}`);
        setCustomTime(`${hh}:${min}`);
      }, [systemTime]);

      const handleSetCustomTime = (e) => {
        e.preventDefault();
        if (customDate && customTime) {
          onSetTime(`${customDate}T${customTime}:00`);
        }
      };

      const handleShiftTime = (mins) => {
        const current = new Date(systemTime);
        current.setMinutes(current.getMinutes() + mins);
        
        const yyyy = current.getFullYear();
        const mm = String(current.getMonth() + 1).padStart(2, '0');
        const dd = String(current.getDate()).padStart(2, '0');
        const hh = String(current.getHours()).padStart(2, '0');
        const min = String(current.getMinutes()).padStart(2, '0');
        
        onSetTime(`${yyyy}-${mm}-${dd}T${hh}:${min}:00`);
      };

      // REAL TIME API-FOOTBALL SCORE SYNC
      const handleSyncScores = async () => {
        if (!apiKey.trim()) {
          triggerSaveToast("Ingresa tu API Key de API-football");
          return;
        }
        
        setSyncLoading(true);
        localStorage.setItem("api_football_key", apiKey.trim());

        try {
          // 1. Fetch fixtures from API-football
          // League ID 1 represents the FIFA World Cup
          const response = await fetch('https://v3.football.api-sports.io/fixtures?league=1&season=2026', {
            headers: {
              'x-apisports-key': apiKey.trim(),
              'x-rapidapi-host': 'v3.football.api-sports.io'
            }
          });

          const resData = await response.json();
          
          if (resData.errors && Object.keys(resData.errors).length > 0) {
            throw new Error(JSON.stringify(resData.errors));
          }
          
          const fixtures = resData.response;
          if (!fixtures || fixtures.length === 0) {
            throw new Error("No se encontraron partidos para la temporada 2026.");
          }

          // 2. Loop through local matches and update from api response
          let updateCount = 0;
          for (const dbMatch of matches) {
            const homeEnglish = TEAM_NAME_MAP[dbMatch.home_team_name];
            const awayEnglish = TEAM_NAME_MAP[dbMatch.away_team_name];

            const fixture = fixtures.find(f => 
              (f.teams.home.name === homeEnglish && f.teams.away.name === awayEnglish) ||
              (f.teams.home.name === homeEnglish && f.fixture.id === dbMatch.api_fixture_id)
            );

            if (fixture) {
              let apiStatus = fixture.fixture.status.short;
              let dbStatus = "Scheduled";
              
              if (["FT", "AET", "PEN"].includes(apiStatus)) {
                dbStatus = "Finished";
              } else if (["1H", "2H", "HT", "ET", "P", "LIVE"].includes(apiStatus)) {
                dbStatus = "Live";
              }

              const apiHomeScore = fixture.goals.home;
              const apiAwayScore = fixture.goals.away;

              // If scores or status changed, perform update in Supabase
              if (dbMatch.home_score !== apiHomeScore || dbMatch.away_score !== apiAwayScore || dbMatch.status !== dbStatus || !dbMatch.api_fixture_id) {
                const { error: updateErr } = await supabase
                  .from('matches')
                  .update({
                    home_score: apiHomeScore,
                    away_score: apiAwayScore,
                    status: dbStatus,
                    api_fixture_id: fixture.fixture.id
                  })
                  .eq('id', dbMatch.id);

                if (updateErr) console.error("Error updating match in Supabase:", updateErr);
                else updateCount++;
              }
            }
          }

          // 3. Reload matches
          const { data: refreshedMatches } = await supabase.from('matches').select('*').order('date');
          setMatches(refreshedMatches || []);
          triggerSaveToast(`Sincronización finalizada. ${updateCount} partidos actualizados.`);
        } catch (err) {
          console.error("Sync error:", err);
          triggerSaveToast(`Error de sync: ${err.message}`);
        } finally {
          setSyncLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex justify-end">
          <div onClick={onClose} className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
          
          <div className="relative w-full max-w-md bg-soccer-dark border-l border-soccer-border h-full flex flex-col overflow-y-auto shadow-2xl p-6 z-10 animate-slide-in">
            <div className="flex justify-between items-center border-b border-soccer-border pb-4 mb-6">
              <h2 className="text-md font-bold display-font text-white flex items-center gap-2">
                <Icon name="settings" className="w-5 h-5 text-soccer-accent animate-spin-slow" />
                Panel de Administración Real
              </h2>
              <button
                onClick={onClose}
                className="text-soccer-textMuted hover:text-white text-xs font-semibold px-2 py-1 bg-slate-900 border border-soccer-border rounded-lg"
              >
                Cerrar
              </button>
            </div>

            {/* SYNC CON API-FOOTBALL */}
            <div className="space-y-4 border-b border-soccer-border/80 pb-6 mb-6">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-primary display-font flex items-center gap-1.5">
                <Icon name="sync" className="w-4 h-4 text-soccer-primary" />
                Sincronización API-football
              </h3>
              <p className="text-[11px] text-soccer-textMuted">Conecta tu API-key para actualizar automáticamente los resultados reales desde la API de api-football.com.</p>
              
              <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-2.5 text-[10px] text-amber-300 leading-normal">
                <strong>⚠️ Limitación del Plan Gratis:</strong> Los planes gratuitos de API-football no permiten consultar la temporada 2026 (solo 2022-2024). Si tienes un plan gratuito, debes usar el <strong>Editor Manual de Partidos</strong> que está justo abajo para actualizar los marcadores reales.
              </div>

              <div className="space-y-2">
                <input
                  type="password"
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                  placeholder="x-apisports-key"
                  className="w-full bg-slate-950 border border-soccer-border px-3 py-2 rounded-xl text-xs text-white focus:outline-none"
                />
                <button
                  onClick={handleSyncScores}
                  disabled={syncLoading}
                  className="w-full bg-soccer-primary hover:bg-emerald-400 disabled:opacity-50 text-soccer-darker text-xs font-bold py-2 rounded-xl transition-colors flex justify-center items-center gap-1.5"
                >
                  {syncLoading ? (
                    <>
                      <Icon name="soccerBall" className="w-4 h-4 animate-spin" />
                      <span>Sincronizando...</span>
                    </>
                  ) : (
                    <span>Sincronizar Resultados Reales</span>
                  )}
                </button>
              </div>
            </div>

            {/* TIME TRAVEL (UI SIMULATION) */}
            <div className="space-y-4 border-b border-soccer-border/80 pb-6 mb-6">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-soccer-accent display-font">Máquina del Tiempo (Test UI)</h3>
              <p className="text-[11px] text-soccer-textMuted">Viaja en el tiempo para simular la vista del calendario y comprobar bloqueos locales.</p>

              <div className="bg-slate-950 border border-soccer-border rounded-xl p-3 text-center">
                <span className="text-[10px] text-soccer-textMuted font-bold uppercase block mb-1">Hora Activa en tu Navegador</span>
                <span className="font-mono text-sm font-black text-white">{new Date(systemTime).toLocaleString('es-ES')}</span>
              </div>

              <div className="grid grid-cols-3 gap-2">
                <button onClick={() => handleShiftTime(10)} className="bg-slate-900 hover:bg-slate-800 border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">+10m</button>
                <button onClick={() => handleShiftTime(60)} className="bg-slate-900 hover:bg-slate-800 border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">+1h</button>
                <button onClick={onResetTime} className="bg-slate-900 hover:bg-soccer-accent hover:text-soccer-darker border border-soccer-border rounded-lg py-1.5 text-[10px] font-bold text-slate-300">Tiempo Real</button>
              </div>

              <form onSubmit={handleSetCustomTime} className="space-y-3">
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <input
                      type="date"
                      value={customDate}
                      onChange={(e) => setCustomDate(e.target.value)}
                      className="w-full bg-slate-950 border border-soccer-border p-2 rounded-lg text-xs text-white focus:outline-none"
                    />
                  </div>
                  <div>
                    <input
                      type="time"
                      value={customTime}
                      onChange={(e) => setCustomTime(e.target.value)}
                      className="w-full bg-slate-950 border border-soccer-border p-2 rounded-lg text-xs text-white focus:outline-none"
                    />
                  </div>
                </div>
                <button type="submit" className="w-full bg-soccer-accent hover:bg-amber-400 text-soccer-darker text-xs font-bold py-2 rounded-xl transition-colors">
                  Viajar
                </button>
              </form>
            </div>

            {/* MANUAL SCORE OVERRIDES */}
            <div className="space-y-4 flex-1 flex flex-col overflow-hidden">
              <h3 className="text-xs uppercase font-extrabold tracking-wider text-white display-font flex-shrink-0">Editor Manual de Partidos</h3>
              <div className="space-y-3 overflow-y-auto flex-1 pr-1">
                {matches.map(m => (
                  <AdminMatchRow
                    key={m.id}
                    match={m}
                    onSave={onUpdateMatch}
                  />
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // Single match admin row within control panel
    function AdminMatchRow({ match, onSave }) {
      const [hScore, setHScore] = useState(match.home_score !== null ? match.home_score : "");
      const [aScore, setAScore] = useState(match.away_score !== null ? match.away_score : "");
      const [status, setStatus] = useState(match.status);

      useEffect(() => {
        setHScore(match.home_score !== null ? match.home_score : "");
        setAScore(match.away_score !== null ? match.away_score : "");
        setStatus(match.status);
      }, [match]);

      const handleUpdate = () => {
        // Auto-finalize if scores are provided and status is Scheduled
        let finalStatus = status;
        if (hScore !== "" && hScore !== null && aScore !== "" && aScore !== null && status === "Scheduled") {
          finalStatus = "Finished";
        }

        onSave(match.id, {
          homeScore: hScore,
          awayScore: aScore,
          status: finalStatus
        });
      };

      return (
        <div className="bg-soccer-darker border border-soccer-border rounded-xl p-3 space-y-2 text-xs">
          <div className="flex justify-between items-center text-[10px] text-soccer-textMuted uppercase font-bold">
            <span className="truncate max-w-[150px]">{match.stage}</span>
            <span>{new Date(match.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })}</span>
          </div>

          <div className="flex items-center justify-between gap-1.5">
            <span className="font-semibold text-slate-300 w-1/3 truncate text-[11px] text-left flex items-center gap-1">
              {TEAM_COUNTRY_CODES[match.home_team_name] ? (
                <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[match.home_team_name]}.png`} alt={match.home_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
              ) : (
                <span className="text-sm select-none">🏳️</span>
              )}
              <span className="truncate">{match.home_team_name}</span>
            </span>
            
            <div className="flex items-center gap-1 w-1/3 justify-center">
              <input
                type="number"
                value={hScore}
                onChange={(e) => {
                  const val = e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value));
                  setHScore(val);
                  if (val !== "" && aScore !== "" && status === "Scheduled") {
                    setStatus("Finished");
                  }
                }}
                placeholder="0"
                className="w-8 h-8 rounded-lg bg-slate-950 border border-soccer-border text-center text-xs font-bold text-white focus:outline-none"
              />
              <span className="text-[10px] font-bold text-soccer-textMuted">-</span>
              <input
                type="number"
                value={aScore}
                onChange={(e) => {
                  const val = e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value));
                  setAScore(val);
                  if (hScore !== "" && val !== "" && status === "Scheduled") {
                    setStatus("Finished");
                  }
                }}
                placeholder="0"
                className="w-8 h-8 rounded-lg bg-slate-950 border border-soccer-border text-center text-xs font-bold text-white focus:outline-none"
              />
            </div>

            <span className="font-semibold text-slate-300 w-1/3 truncate text-[11px] text-right flex items-center justify-end gap-1">
              <span className="truncate">{match.away_team_name}</span>
              {TEAM_COUNTRY_CODES[match.away_team_name] ? (
                <img src={`https://flagcdn.com/16x12/${TEAM_COUNTRY_CODES[match.away_team_name]}.png`} alt={match.away_team_name} className="w-4 h-3 object-cover rounded-sm shadow-sm select-none" />
              ) : (
                <span className="text-sm select-none">🏳️</span>
              )}
            </span>
          </div>

          <div className="flex items-center justify-between gap-2 border-t border-slate-800/85 pt-2">
            <select
              value={status}
              onChange={(e) => setStatus(e.target.value)}
              className="bg-slate-950 border border-soccer-border rounded-lg text-[10px] py-1 px-1.5 text-slate-200 focus:outline-none"
            >
              <option value="Scheduled">Programado</option>
              <option value="Live">En Vivo</option>
              <option value="Finished">Finalizado</option>
            </select>
            
            <button
              onClick={handleUpdate}
              className="bg-soccer-primary text-soccer-darker hover:bg-emerald-400 font-extrabold text-[10px] py-1 px-2.5 rounded-lg transition-all"
            >
              Actualizar
            </button>
          </div>
        </div>
      );
    }

    // Render application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
